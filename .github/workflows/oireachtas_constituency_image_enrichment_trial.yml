name: Oireachtas Constituency Image Enrichment Trial (Manual)

on:
  workflow_dispatch:
    inputs:
      row_limit:
        description: "Rows to process from existing legacy constituency image index; 0 = all"
        required: true
        default: "0"
      sample_rows:
        description: "Review sample row count"
        required: false
        default: "10"

concurrency:
  group: oireachtas-constituency-image-enrichment-trial
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  constituency_image_enrichment_trial:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ca-central-1"
      S3_BUCKET: "eirepolitic-data"
      REVIEW_OUTPUT_ROOT: "oireachtas_review_output"
      REVIEW_BRANCH: "oireachtas-review-output"
      ROW_LIMIT: ${{ inputs.row_limit }}
      SAMPLE_ROWS: ${{ inputs.sample_rows }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build constituency image enrichment trial
        run: |
          python -m extract.oireachtas.enrichment_constituency_images | tee oireachtas_constituency_image_enrichment.log

      - name: Publish review output branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "${REVIEW_OUTPUT_ROOT}" ]]; then
            echo "No review output directory found: ${REVIEW_OUTPUT_ROOT}; skipping branch publish."
            exit 0
          fi
          rm -rf /tmp/oireachtas-review-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${REVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${REVIEW_BRANCH}:${REVIEW_BRANCH}"
            git worktree add /tmp/oireachtas-review-worktree "${REVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/oireachtas-review-worktree HEAD
            git -C /tmp/oireachtas-review-worktree switch --orphan "${REVIEW_BRANCH}"
            git -C /tmp/oireachtas-review-worktree rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/oireachtas-review-worktree/review
          cp -R "${REVIEW_OUTPUT_ROOT}/." /tmp/oireachtas-review-worktree/
          git -C /tmp/oireachtas-review-worktree add .
          git -C /tmp/oireachtas-review-worktree commit -m "Update Oireachtas constituency image enrichment review output for run ${GITHUB_RUN_ID}" || true
          for attempt in 1 2 3; do
            git -C /tmp/oireachtas-review-worktree pull --rebase origin "${REVIEW_BRANCH}" || true
            if git -C /tmp/oireachtas-review-worktree push origin "${REVIEW_BRANCH}"; then
              exit 0
            fi
            if [[ "${attempt}" == "3" ]]; then
              echo "Review branch push failed after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oireachtas constituency image enrichment trial"
            echo
            echo "- Review branch: \`${REVIEW_BRANCH}\`"
            echo "- This workflow does not create or overwrite image files."
            echo "- This workflow does not overwrite legacy constituency image index keys."
            echo
            echo '```text'
            if [[ -f oireachtas_constituency_image_enrichment.log ]]; then
              cat oireachtas_constituency_image_enrichment.log
            else
              echo "No constituency image enrichment log found."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload enrichment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-constituency-image-enrichment-trial-output
          path: |
            oireachtas_review_output/**
            oireachtas_constituency_image_enrichment.log
          if-no-files-found: warn
