name: Oireachtas Batch 4 manifest diagnostic

on:
  workflow_dispatch:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch4_manifest_diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      BATCH_ID: batch4-validation-29312292644-1
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture manifest result
        shell: bash
        run: |
          set +e
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            assemble \
            --batch-id "${BATCH_ID}" \
            --required-table silver_members \
            > /tmp/manifest.json 2> /tmp/manifest.err
          status=$?
          {
            echo '# Oireachtas Batch 4 manifest diagnostic'
            echo
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Batch ID: ${BATCH_ID}"
            echo "- Exit code: ${status}"
            echo
            echo '## Output'
            echo
            echo '```json'
            cat /tmp/manifest.json
            echo '```'
            echo
            echo '## Error'
            echo
            echo '```text'
            cat /tmp/manifest.err
            echo '```'
          } > docs/oireachtas_batch4_manifest_diagnostic.md
      - name: Commit diagnostic
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_batch4_manifest_diagnostic.md
          git commit -m "Record Oireachtas Batch 4 manifest diagnostic ${GITHUB_RUN_ID}"
          git push origin HEAD:repair/oireachtas-production-hardening
