name: Oireachtas validation checkpoint 2

on:
  push:
    branches:
      - validation/oireachtas-reality-checks
    paths:
      - process/oireachtas_validate_reference_members.py
      - .github/workflows/oireachtas_validation_checkpoint2.yml
      - configs/oireachtas/validation_expectations.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/oireachtas-reality-checks
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run checkpoint 2 validation
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_validate_reference_members.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --sample-count 5 \
            --output-dir oireachtas_validation_output/checkpoint2 \
            | tee checkpoint2_console.json
      - name: Commit validation report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/oireachtas_validation/checkpoint2
          cp oireachtas_validation_output/checkpoint2/* docs/oireachtas_validation/checkpoint2/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_validation/checkpoint2
          if git diff --cached --quiet; then
            echo 'No report changes.'
          else
            git commit -m 'Record Oireachtas checkpoint 2 validation results'
            git push origin HEAD:validation/oireachtas-reality-checks
          fi
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-validation-checkpoint2-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            oireachtas_validation_output/checkpoint2/**
            checkpoint2_console.json
          if-no-files-found: warn
          retention-days: 365
