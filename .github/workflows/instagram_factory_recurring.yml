name: Instagram Content Factory recurring draft generation

on:
  workflow_dispatch:
    inputs:
      project_path:
        description: Repository path to project.yml
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: instagram-factory-recurring-${{ inputs.project_path }}
  cancel-in-progress: false

jobs:
  readiness-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      AWS_DEFAULT_REGION: ca-central-1
      BUCKET: eirepolitic-data
      PROJECT_PATH: ${{ inputs.project_path }}
      OUTPUT_ROOT: generated_factory_recurring

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Resolve project settings
        id: project
        shell: bash
        run: |
          set -euo pipefail
          python process/instagram_factory.py validate-project --project "$PROJECT_PATH"
          readarray -t VALUES < <(python - <<'PY'
          import yaml
          project = yaml.safe_load(open('${{ inputs.project_path }}', encoding='utf-8'))
          print(project['project_id'])
          print(project['output']['s3_prefix'])
          PY
          )
          echo "project_id=${VALUES[0]}" >> "$GITHUB_OUTPUT"
          echo "prefix=${VALUES[1]}" >> "$GITHUB_OUTPUT"
      - name: Download latest manifest when present
        run: |
          aws s3 cp "s3://$BUCKET/${{ steps.project.outputs.prefix }}/latest.json" latest.json --only-show-errors || true
      - name: Evaluate production readiness
        id: readiness
        shell: bash
        run: |
          set -euo pipefail
          ARGS=(python process/instagram_factory.py check-readiness --project "$PROJECT_PATH" --data-source s3)
          if [ -f latest.json ]; then ARGS+=(--latest-manifest latest.json); fi
          "${ARGS[@]}" | tee readiness.json
          READY=$(python - <<'PY'
          import json
          print(str(json.load(open('readiness.json', encoding='utf-8'))['ready']).lower())
          PY
          )
          echo "ready=$READY" >> "$GITHUB_OUTPUT"
      - name: Generate new draft batch
        if: steps.readiness.outputs.ready == 'true'
        run: |
          python process/instagram_factory.py generate-batch \
            --project "$PROJECT_PATH" \
            --data-source s3 \
            --output-root "$OUTPUT_ROOT" \
            --git-sha "$GITHUB_SHA" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            | tee generation.json
      - name: Resolve generated run
        if: steps.readiness.outputs.ready == 'true'
        id: run
        shell: bash
        run: |
          set -euo pipefail
          readarray -t VALUES < <(python - <<'PY'
          import json
          report = json.load(open('generation.json', encoding='utf-8'))
          print(report['run_id'])
          print(report['output_root'])
          PY
          )
          echo "run_id=${VALUES[0]}" >> "$GITHUB_OUTPUT"
          echo "run_root=${VALUES[1]}" >> "$GITHUB_OUTPUT"
      - name: Upload immutable run
        if: steps.readiness.outputs.ready == 'true'
        run: |
          aws s3 cp "${{ steps.run.outputs.run_root }}/" \
            "s3://$BUCKET/${{ steps.project.outputs.prefix }}/runs/${{ steps.run.outputs.run_id }}/" \
            --recursive --only-show-errors
          aws s3 cp "${{ steps.run.outputs.run_root }}/run_manifest.json" \
            "s3://$BUCKET/${{ steps.project.outputs.prefix }}/latest.json" \
            --only-show-errors
      - name: Upload workflow evidence
        uses: actions/upload-artifact@v4
        with:
          name: instagram-recurring-${{ steps.project.outputs.project_id }}-${{ github.run_id }}
          path: |
            readiness.json
            generation.json
            ${{ steps.run.outputs.run_root }}/
          if-no-files-found: warn
      - name: Summary
        run: |
          {
            echo "## Recurring Content Factory check"
            echo "- Project: \`${{ steps.project.outputs.project_id }}\`"
            echo "- Ready: \`${{ steps.readiness.outputs.ready }}\`"
            echo "- Publishing allowed: \`false\`"
          } >> "$GITHUB_STEP_SUMMARY"
