name: Oireachtas baseline audit

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oireachtas-baseline-audit
  cancel-in-progress: false

jobs:
  inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install audit dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install boto3
      - name: Create read-only inventory
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_audit_inventory.py
      - name: Upload baseline audit
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-baseline-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/oireachtas-baseline-audit/
          if-no-files-found: error
          retention-days: 30
