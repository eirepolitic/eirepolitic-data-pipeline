name: Oireachtas validation framework

on:
  push:
    branches:
      - validation/oireachtas-reality-checks
    paths:
      - configs/oireachtas/validation_expectations.yml
      - process/oireachtas_validate_table.py
      - process/oireachtas_validate_cross_table.py
      - process/oireachtas_validate_external.py
      - tests/test_oireachtas_validation_framework.py
      - .github/workflows/oireachtas_validation_framework.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  framework:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/oireachtas-reality-checks
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run framework unit tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q tests/test_oireachtas_validation_framework.py
      - name: Validate all tables have external test strategies
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_validate_external.py \
            --output-dir oireachtas_validation_output
      - name: Verify framework output contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          matrix = json.loads(Path('oireachtas_validation_output/external_validation_matrix.json').read_text())
          plan = json.loads(Path('oireachtas_validation_output/external_validation_plan.json').read_text())
          assert len(plan) == 31, len(plan)
          assert len(matrix) == 62, len(matrix)
          assert all(row['status'] == 'pass' for row in matrix), [row for row in matrix if row['status'] != 'pass']
          assert all(item['strategy'] for item in plan.values())
          print(json.dumps({'registered_tables': len(plan), 'matrix_checks': len(matrix)}, indent=2))
          PY
      - name: Upload framework evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-validation-framework-${{ github.run_id }}-${{ github.run_attempt }}
          path: oireachtas_validation_output/**
          if-no-files-found: warn
          retention-days: 180
