name: Oireachtas Batch 6 live refresh diagnostic

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch6_live_diagnostic.yml

permissions:
  contents: write

concurrency:
  group: oireachtas-batch6-live-diagnostic
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      REVIEW_OUTPUT_ROOT: oireachtas_review_output
      OIREACHTAS_BATCH_ID: batch6-diagnostic-${{ github.run_id }}-${{ github.run_attempt }}
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'true'
      TABLES: silver_members,silver_member_memberships,silver_member_parties,silver_member_constituencies,silver_member_offices,silver_debate_records,silver_debate_sections,silver_speeches,silver_divisions,silver_division_tallies,silver_member_votes,silver_questions,gold_current_members,gold_member_activity_yearly,gold_member_activity_monthly,gold_content_fact_pool,control_pipeline_runs,control_table_manifests,control_data_quality_results
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run until first table failure
        id: build
        shell: bash
        run: |
          set -uo pipefail
          date_start="$(date -u -d '35 days ago' +%F)"
          date_end="$(date -u +%F)"
          : > /tmp/batch6-diagnostic.log
          failed_table=''
          exit_code=0
          IFS=',' read -ra table_list <<< "${TABLES}"
          for table in "${table_list[@]}"; do
            echo "===== TABLE ${table} =====" | tee -a /tmp/batch6-diagnostic.log
            set +e
            python -m extract.oireachtas.build_table \
              --table "${table}" \
              --mode incremental \
              --publish-latest true \
              --batch-id "${OIREACHTAS_BATCH_ID}" \
              --chamber dail \
              --house-no 34 \
              --date-start "${date_start}" \
              --date-end "${date_end}" \
              --limit 100 \
              --sample-rows 10 \
              --write-review-sample \
              --s3-bucket "${S3_BUCKET}" \
              --aws-region "${AWS_REGION}" \
              --review-root "${REVIEW_OUTPUT_ROOT}" \
              --github-repository "${GITHUB_REPOSITORY}" \
              >> /tmp/batch6-diagnostic.log 2>&1
            status=$?
            set -e
            if [[ "${status}" != '0' ]]; then
              failed_table="${table}"
              exit_code="${status}"
              break
            fi
          done
          echo "failed_table=${failed_table}" >> "${GITHUB_OUTPUT}"
          echo "exit_code=${exit_code}" >> "${GITHUB_OUTPUT}"
      - name: Commit sanitized diagnostic
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Oireachtas Batch 6 live refresh diagnostic'
            echo
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Batch ID: ${OIREACHTAS_BATCH_ID}"
            echo "- Failed table: ${{ steps.build.outputs.failed_table || 'none' }}"
            echo "- Exit code: ${{ steps.build.outputs.exit_code }}"
            echo
            echo '```text'
            tail -n 240 /tmp/batch6-diagnostic.log
            echo '```'
          } > docs/oireachtas_batch6_live_diagnostic.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_batch6_live_diagnostic.md
          git commit -m "Record Oireachtas Batch 6 live diagnostic ${GITHUB_RUN_ID}"
          git push origin HEAD:repair/oireachtas-production-hardening
