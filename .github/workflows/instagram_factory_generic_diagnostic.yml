name: Instagram Content Factory generic diagnostic

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-generic-core
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml pillow matplotlib boto3 requests
      - name: Capture tests
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_instagram_factory tests.test_instagram_factory_phase4 tests.test_instagram_factory_phase5 tests.test_instagram_factory_phase6 tests.test_instagram_factory_generic_core -v > generic_test_output.txt 2>&1
          echo $? > generic_test_exit_code.txt
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generic_test_output.txt generic_test_exit_code.txt
          git commit -m "chore(instagram): capture generic test diagnostic" || true
          git push origin HEAD:feature/instagram-content-factory-generic-core
