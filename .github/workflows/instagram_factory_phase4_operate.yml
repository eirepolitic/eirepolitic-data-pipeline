name: Instagram Content Factory Phase 4 operate

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Operation to perform
        required: true
        type: choice
        options: [mark_review, regenerate]
      source_run_id:
        description: Existing immutable run ID
        required: true
        type: string
      item_slugs:
        description: Space-separated item slugs
        required: true
        type: string
      slide_ids:
        description: Optional space-separated slide IDs
        required: false
        type: string
      review_status:
        description: Review status for mark_review
        required: false
        type: choice
        options: [unreviewed, approved, changes_requested, rejected]
        default: unreviewed
      reason:
        description: Review note or regeneration reason
        required: true
        type: string

permissions:
  contents: read

jobs:
  operate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      AWS_DEFAULT_REGION: ca-central-1
      BUCKET: eirepolitic-data
      PROJECT_PREFIX: processed/instagram_factory/projects/constituency_issue_profile_v1
      PROJECT_PATH: instagram/projects/constituency_issue_profile_v1/project.yml

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Download source run
        run: |
          mkdir -p source-run
          aws s3 cp "s3://$BUCKET/$PROJECT_PREFIX/runs/${{ inputs.source_run_id }}/" source-run/ --recursive --only-show-errors
          test -f source-run/run_manifest.json
      - name: Mark review
        if: inputs.operation == 'mark_review'
        shell: bash
        run: |
          set -euo pipefail
          for ITEM in ${{ inputs.item_slugs }}; do
            if [ -n "${{ inputs.slide_ids }}" ]; then
              for SLIDE in ${{ inputs.slide_ids }}; do
                python process/instagram_factory.py mark-review \
                  --run-root source-run \
                  --item "$ITEM" \
                  --slide "$SLIDE" \
                  --status "${{ inputs.review_status }}" \
                  --note "${{ inputs.reason }}" \
                  --reviewer "${{ github.actor }}"
              done
            else
              python process/instagram_factory.py mark-review \
                --run-root source-run \
                --item "$ITEM" \
                --status "${{ inputs.review_status }}" \
                --note "${{ inputs.reason }}" \
                --reviewer "${{ github.actor }}"
            fi
          done
          aws s3 cp source-run/review/review_state.json \
            "s3://$BUCKET/$PROJECT_PREFIX/runs/${{ inputs.source_run_id }}/review/review_state.json" \
            --only-show-errors
      - name: Regenerate selected outputs
        if: inputs.operation == 'regenerate'
        shell: bash
        run: |
          set -euo pipefail
          NEW_RUN_ID="${{ inputs.source_run_id }}-regen-${GITHUB_RUN_ID}"
          ARGS=(
            python process/instagram_factory.py regenerate
            --project "$PROJECT_PATH"
            --source-run-root source-run
            --destination-run-root derived-run
            --new-run-id "$NEW_RUN_ID"
            --items ${{ inputs.item_slugs }}
            --reason "${{ inputs.reason }}"
            --data-source s3
          )
          if [ -n "${{ inputs.slide_ids }}" ]; then
            ARGS+=(--slides ${{ inputs.slide_ids }})
          fi
          "${ARGS[@]}" | tee regeneration-result.json
          aws s3 cp derived-run/ "s3://$BUCKET/$PROJECT_PREFIX/runs/$NEW_RUN_ID/" --recursive --only-show-errors
          echo "NEW_RUN_ID=$NEW_RUN_ID" >> "$GITHUB_ENV"
      - name: Upload operation artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase4-${{ inputs.operation }}-${{ github.run_id }}
          path: |
            source-run/review/review_state.json
            derived-run/
            regeneration-result.json
          if-no-files-found: warn
      - name: Summary
        run: |
          {
            echo "## Phase 4 operation"
            echo "- Operation: \`${{ inputs.operation }}\`"
            echo "- Source run: \`${{ inputs.source_run_id }}\`"
            echo "- Items: \`${{ inputs.item_slugs }}\`"
            echo "- Slides: \`${{ inputs.slide_ids }}\`"
            echo "- Publishing allowed: \`false\`"
            if [ -n "${NEW_RUN_ID:-}" ]; then echo "- Derived run: \`$NEW_RUN_ID\`"; fi
          } >> "$GITHUB_STEP_SUMMARY"
