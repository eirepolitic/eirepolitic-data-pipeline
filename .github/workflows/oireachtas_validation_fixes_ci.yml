name: Oireachtas validation fixes CI

on:
  push:
    branches:
      - fix/oireachtas-validation-findings
    paths:
      - extract/oireachtas/history_dedupe.py
      - tests/test_oireachtas_history_dedupe.py
      - .github/workflows/oireachtas_validation_fixes_ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/oireachtas-validation-findings
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run repair regression tests
        run: |
          python -m unittest \
            tests.test_oireachtas_history_dedupe \
            tests.test_oireachtas_repair_regressions
