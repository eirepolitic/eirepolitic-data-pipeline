name: Ridiculous Sentences Weekly (Manual)

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "year = rebuild one year, previous_week = rebuild just the previous completed week"
        required: false
        default: "year"
      run_year:
        description: "Year to process when run_mode=year"
        required: false
        default: "2026"
      as_of_date:
        description: "Optional YYYY-MM-DD override when run_mode=previous_week"
        required: false
        default: ""
      test_rows:
        description: "Limit shortlisted candidate rows for testing (blank = 0)"
        required: false
        default: ""
      openai_model:
        description: "Model name"
        required: false
        default: "gpt-4.1-mini"
      batch_size:
        description: "How many candidate sentences to score per LLM call"
        required: false
        default: "20"
      max_candidates_per_week_for_llm:
        description: "Shortlist size per week before LLM scoring"
        required: false
        default: "250"
      top_n_per_week:
        description: "How many final sentences to keep per week"
        required: false
        default: "10"

concurrency:
  group: ridiculous-sentences-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RUN_MODE: ${{ inputs.run_mode }}
      RUN_YEAR: ${{ inputs.run_year }}
      AS_OF_DATE: ${{ inputs.as_of_date }}
      TEST_ROWS: ${{ inputs.test_rows || '0' }}
      OPENAI_MODEL: ${{ inputs.openai_model }}
      BATCH_SIZE: ${{ inputs.batch_size }}
      MAX_CANDIDATES_PER_WEEK_FOR_LLM: ${{ inputs.max_candidates_per_week_for_llm }}
      TOP_N_PER_WEEK: ${{ inputs.top_n_per_week }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build weekly ridiculous sentences table
        run: |
          python process/ridiculous_sentences_weekly.py
