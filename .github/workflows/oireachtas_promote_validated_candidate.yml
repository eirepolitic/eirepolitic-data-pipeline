name: Promote validated Oireachtas candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: oireachtas-production-promotion
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      BATCH_ID: validation-fixes-20260719-3
      OIREACHTAS_PUBLISH_ENABLED: 'true'
      OIREACHTAS_PUBLISH_LATEST: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture current pointers
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status \
            | tee pre-promotion-status.json
      - name: Revalidate immutable candidate
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_reassemble_candidate.py \
              --batch-id "${BATCH_ID}" \
              --bucket "${S3_BUCKET}" \
              --region "${AWS_REGION}" \
              | tee release-candidate-manifest.json
          python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('release-candidate-manifest.json').read_text())
          assert manifest['status'] == 'validated', manifest
          validation = manifest['validation']
          assert validation['missing_tables'] == [], validation
          assert validation['failed_tables'] == [], validation
          assert validation['missing_objects'] == [], validation
          assert validation['duplicate_tables'] == [], validation
          assert manifest['table_count'] >= 31, manifest
          PY
      - name: Promote exact candidate
        id: promote
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" promote \
            --batch-id "${BATCH_ID}" \
            | tee promotion-result.json
      - name: Verify production pointer
        id: verify_pointer
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status \
            | tee post-promotion-status.json
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('post-promotion-status.json').read_text())
          production = status['production']
          assert production['mode'] == 'batch', production
          assert production['batch_id'] == 'validation-fixes-20260719-3', production
          PY
      - name: Run post-promotion acceptance checks
        id: verify_data
        run: |
          set -euo pipefail
          mkdir -p release_acceptance
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_verify_validation_fixes.py \
              --batch-id "${BATCH_ID}" \
              --bucket "${S3_BUCKET}" \
              --region "${AWS_REGION}" \
              --date-end 2026-07-19 \
              --output-dir release_acceptance \
              | tee post-promotion-acceptance.log
      - name: Roll back after failed verification
        if: failure() && steps.promote.outcome == 'success'
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" rollback-previous \
            | tee automatic-rollback-result.json
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-production-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            pre-promotion-status.json
            release-candidate-manifest.json
            promotion-result.json
            post-promotion-status.json
            release_acceptance/**
            post-promotion-acceptance.log
            automatic-rollback-result.json
          if-no-files-found: warn
          retention-days: 365
