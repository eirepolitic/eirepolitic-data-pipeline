name: Generate Instagram Constituency Test Post (Manual)

on:
  workflow_dispatch:
    inputs:
      constituency:
        description: "Constituency name"
        required: true
        default: "Wicklow-Wexford"
      member_name:
        description: "Optional TD full name override"
        required: false
        default: ""
      spec_path:
        description: "YAML spec path"
        required: true
        default: "instagram/specs/constituency_test_post.yml"

concurrency:
  group: instagram-constituency-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: "eirepolitic-data"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Render constituency test post
        run: |
          python process/instagram_render_post.py \
            --spec "${{ inputs.spec_path }}" \
            --constituency "${{ inputs.constituency }}" \
            --member-name "${{ inputs.member_name }}"

      - name: Upload generated post artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-constituency-test
          path: generated_posts/
          if-no-files-found: error
