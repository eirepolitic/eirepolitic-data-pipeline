name: Apply member history builder fix v2

on:
  push:
    branches:
      - fix/oireachtas-validation-findings
    paths:
      - .github/workflows/oireachtas_apply_history_builder_fix_v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/oireachtas-validation-findings
          fetch-depth: 0
      - name: Apply patch script
        run: python process/apply_oireachtas_history_builder_fix.py
      - name: Commit builder changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extract/oireachtas/table_member_parties.py extract/oireachtas/table_member_constituencies.py
          git commit -m 'Deduplicate member history builders by business key'
          git push origin HEAD:fix/oireachtas-validation-findings
