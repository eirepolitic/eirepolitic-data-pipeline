name: Add horizontal bar validation profile

on:
  workflow_dispatch:
  push:
    branches:
      - feature/instagram-content-factory-party-project
    paths:
      - ".github/workflows/instagram_factory_horizontal_profile_update.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-party-project
          fetch-depth: 0
      - name: Update visual catalogue
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import yaml

          path = Path("instagram/catalogues/visual_types.yml")
          payload = yaml.safe_load(path.read_text(encoding="utf-8"))
          for visual in payload["visual_types"]:
              if visual["visual_type_id"] == "horizontal_bar_draft_v1":
                  visual["validation_profile"] = {
                      "profile_id": "horizontal_bar_real_data_v1",
                      "data_policy": "real_data_first",
                      "required_scenarios": [
                          "item_count_min",
                          "item_count_max",
                          "labels_short",
                          "labels_long",
                          "values_small",
                          "values_large",
                          "values_tight",
                          "values_wide",
                          "single_outlier",
                          "all_equal",
                          "ties",
                          "zeros",
                          "real_example",
                      ],
                      "thresholds": {
                          "single_outlier_top_to_second_ratio": 3.0,
                      },
                      "fallback_order": [
                          "current_real",
                          "historical_real",
                          "synthetic_contract_edge",
                          "waived",
                      ],
                      "synthetic_allowed_only_for": [
                          "recurring_project_future_contract_edge",
                          "renderer_regression_fixture",
                      ],
                  }
                  break
          else:
              raise SystemExit("horizontal_bar_draft_v1 not found")
          path.write_text(yaml.safe_dump(payload, sort_keys=False, allow_unicode=True), encoding="utf-8")
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram/catalogues/visual_types.yml
          git commit -m "feat(instagram): catalogue horizontal-bar validation profile"
          git push origin HEAD:feature/instagram-content-factory-party-project
