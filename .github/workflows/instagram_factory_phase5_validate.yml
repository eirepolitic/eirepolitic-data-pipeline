name: Instagram Content Factory Phase 5 validation

on:
  workflow_dispatch:
  push:
    branches:
      - feature/instagram-content-factory-phase5-recurring
    paths:
      - "instagram/factory/recurring.py"
      - "process/instagram_factory.py"
      - "tests/test_instagram_factory_phase5.py"
      - ".github/workflows/instagram_factory_phase5_validate.yml"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      AWS_DEFAULT_REGION: ca-central-1
      BUCKET: eirepolitic-data
      PROJECT_PREFIX: processed/instagram_factory/projects/constituency_issue_profile_v1
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase5-recurring
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Validate catalogues and project
        run: |
          python process/instagram_factory.py validate-catalogues
          python process/instagram_factory.py validate-project --project instagram/projects/constituency_issue_profile_v1/project.yml
      - name: Run Phase 1-5 tests
        run: >-
          python -m unittest
          tests.test_instagram_factory
          tests.test_instagram_factory_phase4
          tests.test_instagram_factory_phase5
          -v
      - name: Check live recurring readiness
        shell: bash
        run: |
          set -euo pipefail
          aws s3 cp "s3://$BUCKET/$PROJECT_PREFIX/latest.json" latest.json --only-show-errors || true
          ARGS=(python process/instagram_factory.py check-readiness --data-source s3)
          if [ -f latest.json ]; then ARGS+=(--latest-manifest latest.json); fi
          "${ARGS[@]}" | tee phase5_live_readiness.json
      - name: Commit readiness evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase5_live_readiness.json
          git commit -m "chore(instagram): capture Phase 5 live readiness" || true
          git fetch origin feature/instagram-content-factory-phase5-recurring
          git rebase origin/feature/instagram-content-factory-phase5-recurring
          git push origin HEAD:feature/instagram-content-factory-phase5-recurring
