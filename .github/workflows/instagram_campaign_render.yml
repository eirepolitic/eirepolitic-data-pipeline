name: Instagram Campaign Render (Manual)

on:
  workflow_dispatch:
    inputs:
      campaign_slug:
        description: "Campaign folder under instagram/campaigns"
        required: false
        default: "member_profile_batch_v1"
      spec_file:
        description: "Render spec filename inside the campaign folder"
        required: false
        default: "render_spec_fixture.yml"
      limit:
        description: "Optional row limit override"
        required: false
        default: "3"

concurrency:
  group: instagram-campaign-render
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: "eirepolitic-data"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render campaign, copy pack, and gated queue
        shell: bash
        run: |
          set -o pipefail
          CAMPAIGN_SLUG="${{ inputs.campaign_slug }}"
          SPEC_FILE="${{ inputs.spec_file }}"
          LIMIT="${{ inputs.limit }}"
          CAMPAIGN_SLUG="${CAMPAIGN_SLUG:-member_profile_batch_v1}"
          SPEC_FILE="${SPEC_FILE:-render_spec_fixture.yml}"
          LIMIT="${LIMIT:-3}"
          SPEC_PATH="instagram/campaigns/${CAMPAIGN_SLUG}/${SPEC_FILE}"
          OUTPUT_ROOT=$(python -c 'import sys, yaml; spec=yaml.safe_load(open(sys.argv[1], encoding="utf-8")); print(spec.get("render", {}).get("output_root") or ("generated_posts/" + str(spec.get("campaign", "campaign"))))' "${SPEC_PATH}")
          mkdir -p workflow_debug
          {
            echo "campaign_slug=${CAMPAIGN_SLUG}"
            echo "spec_file=${SPEC_FILE}"
            echo "spec_path=${SPEC_PATH}"
            echo "limit=${LIMIT}"
            echo "output_root=${OUTPUT_ROOT}"
            python --version
            python process/instagram_render_campaign.py \
              --campaign "${SPEC_PATH}" \
              --limit "${LIMIT}"
            python process/instagram_build_copy_pack.py \
              --review-table "${OUTPUT_ROOT}/review/review_table.csv" \
              --copy-dir "${OUTPUT_ROOT}/copy"
            python process/instagram_build_publish_queue.py \
              --copy-csv "${OUTPUT_ROOT}/copy/captions.csv" \
              --queue-dir "${OUTPUT_ROOT}/queue"
          } 2>&1 | tee workflow_debug/campaign_render.log

      - name: Upload campaign outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-campaign-render-output
          path: |
            generated_posts/**
            workflow_debug/
          if-no-files-found: warn
