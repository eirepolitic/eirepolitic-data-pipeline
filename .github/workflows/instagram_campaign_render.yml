name: Instagram Campaign Render (Manual)

on:
  workflow_dispatch:
    inputs:
      campaign_slug:
        description: "Campaign folder under instagram/campaigns"
        required: true
        default: "member_profile_batch_v1"
      limit:
        description: "Optional row limit override"
        required: true
        default: "10"

concurrency:
  group: instagram-campaign-render
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: "eirepolitic-data"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render campaign
        run: |
          python process/instagram_render_campaign.py \
            --campaign "instagram/campaigns/${{ inputs.campaign_slug }}/render_spec.yml" \
            --limit "${{ inputs.limit }}"

      - name: Upload campaign outputs
        uses: actions/upload-artifact@v4
        with:
          name: instagram-campaign-render-output
          path: generated_posts/${{ inputs.campaign_slug }}/
