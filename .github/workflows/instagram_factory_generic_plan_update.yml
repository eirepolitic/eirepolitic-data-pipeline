name: Update Instagram Content Factory generic-core plan status

on:
  workflow_dispatch:
  push:
    branches:
      - feature/instagram-content-factory-generic-core
    paths:
      - ".github/workflows/instagram_factory_generic_plan_update.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-generic-core
          fetch-depth: 0
      - name: Reconcile canonical plan sections
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("instagram/CONTENT_FACTORY_PLAN.md")
          text = path.read_text(encoding="utf-8")

          replacements = {
              r"### 3\.3 Visual QA — built and validated.*?### 3\.4 Live S3 smoke tests — built and validated": """### 3.3 Visual and complete-slide QA — built and validated

For every visual type the system supports deterministic stress cases, contact sheets, metadata, and manifests.

The generic project test renderer now also supports adapter-driven `minimum`, `maximum`, and `real_example` complete-slide scenarios for any registered project adapter. The constituency production adapter is validated, and an independent national-grain test adapter proves the renderer is not tied to constituency fields.

### 3.4 Live S3 smoke tests — built and validated""",
              r"### 3\.6 Post layout renderer — built but not integrated into the new orchestrator.*?### 3\.7 Campaign/batch structure — partially built": """### 3.6 Post layout renderer — integrated into the generic orchestrator

Existing JSON layouts and palettes are resolved through the post-type catalogue. The generic project renderer binds project text and adapter-provided media/visual assets into complete slides.

Current boundary:

- the generic orchestrator owns project validation, scenario rendering, batch rendering, manifests, review state, regeneration, and readiness
- project adapters own data-specific joins, item context, scenario construction, and asset generation
- catalogue entries remain draft until explicit approval

### 3.7 Campaign/batch structure — generic project runs built""",
              r"### 3\.7 Campaign/batch structure — generic project runs built.*?### 3\.8 Review workflows — built for visuals, partial for complete posts": """### 3.7 Campaign/batch structure — generic project runs built

Project-driven batch generation now creates deterministic immutable runs with one folder per configured granularity item, run/item/slide/visual manifests, isolated failures, review state, and project-derived S3 prefixes.

The older campaign renderer remains separate legacy functionality; new factory projects use `instagram/projects/<project_id>/project.yml` and the generic orchestrator.

### 3.8 Review workflows — built for complete posts""",
              r"### 3\.8 Review workflows — built for complete posts.*?### 3\.9 Documentation — built": """### 3.8 Review workflows — built for complete posts

Implemented capabilities:

- per-item and per-slide review status
- append-only review history
- targeted regeneration through project adapters
- immutable prior-run preservation
- static HTML review index
- auditable ready-for-posting gate
- manual project-driven GitHub Actions workflow
- project S3 output structure

Still needed:

- generalized preview publication/direct links for every project workflow
- richer interactive review UI
- reviewer notification
- separate approved-output promotion design if required later

### 3.9 Documentation — built""",
              r"### Phase 2 — complete-slide test generator.*?### Phase 3 — batch generation and S3 project storage": """### Phase 2 — complete-slide test generator

**Status: generic core completed and validated (2026-07-20).**

Implemented:

- adapter-driven minimum, maximum, and real-example scenario contract
- generic complete-slide render orchestration
- project validation manifests
- no-publication safeguards for synthetic scenarios
- constituency production adapter validation
- independent national-grain regression validation

Remaining project-level work:

- each new production adapter must define and validate its own scenario-selection logic and factual real example
- generalized preview publication/contact-sheet navigation needs further work

### Phase 3 — batch generation and S3 project storage""",
              r"### Phase 3 — batch generation and S3 project storage.*?### Phase 4 — review state and targeted regeneration": """### Phase 3 — batch generation and S3 project storage

**Status: generic core completed; first production adapter live-validated (2026-07-20).**

Implemented:

- project-driven grain, stable key fields, label field, ordering, and slide sequence
- adapter-driven item enumeration/context/assets
- deterministic run IDs
- generic run/item/slide/visual manifests
- isolated failures
- project-derived S3 prefixes
- immutable runs and `latest.json`
- constituency production adapter live validation
- national-grain regression proof

### Phase 4 — review state and targeted regeneration""",
              r"### Phase 4 — review state and targeted regeneration\n\nBuild:": """### Phase 4 — review state and targeted regeneration

**Status: completed in the generic core (2026-07-20).**

Build:""",
              r"### Phase 5 — recurring generation\n\nBuild:": """### Phase 5 — recurring generation

**Status: partially completed; manual operation selected (2026-07-20).**

Implemented:

- project-driven readiness checks
- production batch resolution
- duplicate-batch prevention
- manual recurring draft workflow
- immutable draft generation when readiness passes

Still needed for full planned acceptance:

- generic latest-complete-period selection for period-based projects
- upstream workflow/enrichment completion contracts beyond adapter checks
- reviewer notification
- automatic cadence remains intentionally disabled by user decision

Build:""",
          }

          for pattern, replacement in replacements.items():
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"Could not reconcile pattern: {pattern}")

          path.write_text(text, encoding="utf-8")
      - name: Commit plan reconciliation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram/CONTENT_FACTORY_PLAN.md
          git commit -m "docs(instagram): reconcile plan with generic core" || true
          git push origin HEAD:feature/instagram-content-factory-generic-core
