name: Oireachtas reusable validation

on:
  workflow_call:
    inputs:
      batch_id:
        required: true
        type: string
      run_consumers:
        required: false
        type: boolean
        default: false
    outputs:
      status:
        value: ${{ jobs.validate.outputs.status }}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    outputs:
      status: ${{ steps.result.outputs.status }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      REVIEW_OUTPUT_ROOT: oireachtas_review_output
      OIREACHTAS_BATCH_ID: ${{ inputs.batch_id }}
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Stage fresh enrichment contracts into candidate batch
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_stage_downstream_contracts.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --batch-id "${OIREACHTAS_BATCH_ID}" \
            | tee oireachtas_enrichment_staging.json
      - name: Build candidate compatibility adapters
        shell: bash
        run: |
          set -euo pipefail
          python -m extract.oireachtas.downstream_compat | tee oireachtas_compat_adapters.log
      - name: Validate candidate downstream contracts
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_validate_downstream_contracts.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --contract members_compat \
            --contract member_votes_compat \
            --contract member_photo_urls \
            --contract member_summaries \
            --contract constituency_images \
            --contract debate_issue_labels \
            --output oireachtas_downstream_contracts.json
      - name: Run strict compatibility and mismatch validation
        shell: bash
        run: |
          set -euo pipefail
          python -m extract.oireachtas.compat_comparison | tee oireachtas_compat_comparison.log
          python -m extract.oireachtas.mismatch_review | tee oireachtas_mismatch_review.log
      - name: Build year-aware member metrics
        if: inputs.run_consumers
        shell: bash
        run: |
          set -euo pipefail
          export TARGET_YEAR="$(date -u -d '1 year ago' +%Y)"
          python process/build_member_profile_metrics.py | tee member_profile_metrics.json
          echo "TARGET_YEAR=${TARGET_YEAR}" >> "${GITHUB_ENV}"
      - name: Run candidate-only Instagram HTML smoke test
        if: inputs.run_consumers
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_consumer_smoke.py \
            --batch-id "${OIREACHTAS_BATCH_ID}" \
            --target-year "${TARGET_YEAR}" \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --output consumer_smoke \
            | tee oireachtas_consumer_smoke.log
      - name: Reassemble final candidate manifest
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_reassemble_candidate.py \
              --batch-id "${OIREACHTAS_BATCH_ID}" \
              --bucket "${S3_BUCKET}" \
              --region "${AWS_REGION}" \
              --require compat_downstream_adapters \
              | tee oireachtas_final_batch_manifest.json
      - name: Record result
        id: result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          echo "status=${{ job.status }}" >> "${GITHUB_OUTPUT}"
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-validation-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            oireachtas_review_output/**
            oireachtas_enrichment_staging.json
            oireachtas_downstream_contracts.json
            oireachtas_compat_adapters.log
            oireachtas_compat_comparison.log
            oireachtas_mismatch_review.log
            member_profile_metrics.json
            oireachtas_consumer_smoke.log
            consumer_smoke/**
            oireachtas_final_batch_manifest.json
          if-no-files-found: warn
          retention-days: 90
