name: Oireachtas Batch 3 test diagnostic

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch3_test_diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture test output
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_oireachtas_*.py' -v > /tmp/oireachtas-tests.log 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Commit sanitized diagnostic
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Oireachtas Batch 3 test diagnostic'
            echo
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Exit code: ${{ steps.tests.outputs.status }}"
            echo
            echo '```text'
            tail -n 240 /tmp/oireachtas-tests.log
            echo '```'
          } > docs/oireachtas_batch3_test_diagnostic.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_batch3_test_diagnostic.md
          git commit -m "Record Oireachtas Batch 3 test diagnostic ${GITHUB_RUN_ID}"
          git push origin HEAD:repair/oireachtas-production-hardening
