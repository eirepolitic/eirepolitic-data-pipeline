name: Instagram Content Factory party project validation

on:
  workflow_dispatch:
  push:
    branches:
      - feature/instagram-content-factory-party-project
    paths:
      - "instagram/factory/party_adapter.py"
      - "instagram/factory/adapters.py"
      - "instagram/catalogues/metrics.yml"
      - "instagram/visuals/data_mappings/party_issue_counts.yml"
      - "instagram/projects/party_issue_profile_v1/**"
      - "tests/test_instagram_factory_party_project.py"
      - ".github/workflows/instagram_factory_party_project.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      AWS_DEFAULT_REGION: ca-central-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Validate catalogues and party project
        run: |
          python process/instagram_factory.py validate-catalogues
          python process/instagram_factory.py validate-project --project instagram/projects/party_issue_profile_v1/project.yml
      - name: Run generic and party tests
        run: |
          python -m unittest tests.test_instagram_factory_generic_core -v
          python -m unittest tests.test_instagram_factory_party_project -v
      - name: Validate live party scenarios
        run: |
          python process/instagram_factory.py render-tests \
            --project instagram/projects/party_issue_profile_v1/project.yml \
            --data-source s3 \
            --output-root generated_party_live_tests \
            | tee party-live-validation.json
      - name: Upload validation evidence
        uses: actions/upload-artifact@v4
        with:
          name: party-project-validation-${{ github.run_id }}
          path: |
            generated_party_live_tests/
            party-live-validation.json
          if-no-files-found: error
