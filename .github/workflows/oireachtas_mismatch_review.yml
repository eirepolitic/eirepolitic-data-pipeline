name: Oireachtas Member Mismatch Review (Manual)

on:
  workflow_dispatch:
    inputs:
      sample_rows:
        description: "Review sample row count"
        required: false
        default: "50"

concurrency:
  group: oireachtas-member-mismatch-review
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mismatch_review:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ca-central-1"
      S3_BUCKET: "eirepolitic-data"
      REVIEW_OUTPUT_ROOT: "oireachtas_review_output"
      REVIEW_BRANCH: "oireachtas-review-output"
      SAMPLE_ROWS: ${{ inputs.sample_rows }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build mismatch review
        run: |
          python -m extract.oireachtas.mismatch_review | tee oireachtas_mismatch_review.log

      - name: Publish review output branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "${REVIEW_OUTPUT_ROOT}" ]]; then
            echo "No review output directory found: ${REVIEW_OUTPUT_ROOT}; skipping branch publish."
            exit 0
          fi
          rm -rf /tmp/oireachtas-review-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${REVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${REVIEW_BRANCH}:${REVIEW_BRANCH}"
            git worktree add /tmp/oireachtas-review-worktree "${REVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/oireachtas-review-worktree HEAD
            git -C /tmp/oireachtas-review-worktree switch --orphan "${REVIEW_BRANCH}"
            git -C /tmp/oireachtas-review-worktree rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/oireachtas-review-worktree/review
          cp -R "${REVIEW_OUTPUT_ROOT}/." /tmp/oireachtas-review-worktree/
          git -C /tmp/oireachtas-review-worktree add .
          git -C /tmp/oireachtas-review-worktree commit -m "Update Oireachtas mismatch review output for run ${GITHUB_RUN_ID}" || true
          for attempt in 1 2 3; do
            git -C /tmp/oireachtas-review-worktree pull --rebase origin "${REVIEW_BRANCH}" || true
            if git -C /tmp/oireachtas-review-worktree push origin "${REVIEW_BRANCH}"; then
              exit 0
            fi
            if [[ "${attempt}" == "3" ]]; then
              echo "Review branch push failed after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oireachtas member mismatch review"
            echo
            echo "- Review branch: \`${REVIEW_BRANCH}\`"
            echo "- Manifest: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_code_mismatch_review/latest/manifest.json"
            echo "- Sample CSV: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_code_mismatch_review/latest/sample.csv"
            echo "- Report: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_code_mismatch_review/latest/report.md"
            echo
            echo '```text'
            if [[ -f oireachtas_mismatch_review.log ]]; then
              cat oireachtas_mismatch_review.log
            else
              echo "No mismatch review log found."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload mismatch review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-member-mismatch-review-output
          path: |
            oireachtas_review_output/**
            oireachtas_mismatch_review.log
          if-no-files-found: warn
