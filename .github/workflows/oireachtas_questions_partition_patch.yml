name: Oireachtas questions partition integration patch

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - process/apply_oireachtas_questions_partition_patch.py
      - .github/workflows/oireachtas_questions_partition_patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply source patch
        shell: bash
        run: |
          set -euo pipefail
          python process/apply_oireachtas_questions_partition_patch.py
      - name: Commit source patch
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then exit 0; fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extract/oireachtas/table_questions.py
          git commit -m 'Use adaptive date partitions for Oireachtas questions'
          git push origin HEAD:repair/oireachtas-production-hardening
