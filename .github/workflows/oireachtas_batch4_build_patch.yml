name: Oireachtas Batch 4 build integration patch

on:
  workflow_dispatch:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - process/apply_oireachtas_batch4_build_patch.py
      - .github/workflows/oireachtas_batch4_build_patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply deterministic build integration edits
        shell: bash
        run: |
          set -euo pipefail
          python process/apply_oireachtas_batch4_build_patch.py
      - name: Commit integration edits
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extract/oireachtas/build_table.py
          git commit -m 'Integrate Oireachtas table builds with immutable batches'
          git push origin HEAD:repair/oireachtas-production-hardening
