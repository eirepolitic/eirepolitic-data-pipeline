name: Apply Instagram Content Factory Phase 2 quality patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase3-batch
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply Phase 3 correction
        run: python process/fix_phase3_batch_contract.py
      - name: Remove temporary diagnostics
        run: |
          rm process/fix_phase3_batch_contract.py
          rm -f phase3_test_output.txt phase3_test_status.txt
          rm .github/workflows/instagram_factory_phase2_quality_patch.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(instagram): align Phase 3 batch contract"
          git push origin HEAD:feature/instagram-content-factory-phase3-batch
