name: Apply Instagram Content Factory Phase 2 quality patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase2-constituency
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply scenario contract correction
        run: python process/update_constituency_scenario_contract.py
      - name: Remove temporary files
        run: |
          rm process/update_constituency_scenario_contract.py
          rm .github/workflows/apply_constituency_scenario_contract.yml
          rm .github/workflows/instagram_factory_phase2_quality_patch.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(instagram): separate constituency name and result extremes"
          git push origin HEAD:feature/instagram-content-factory-phase2-constituency
