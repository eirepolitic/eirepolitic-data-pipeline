name: Apply Instagram Content Factory Phase 2 quality patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase3-batch
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml pillow matplotlib boto3 requests
      - name: Capture tests
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_instagram_factory -v > phase3_test_output.txt 2>&1
          STATUS=$?
          cat phase3_test_output.txt
          echo "$STATUS" > phase3_test_status.txt
          exit 0
      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add phase3_test_output.txt phase3_test_status.txt
          git commit -m "chore(instagram): capture Phase 3 test failure"
          git push origin HEAD:feature/instagram-content-factory-phase3-batch
