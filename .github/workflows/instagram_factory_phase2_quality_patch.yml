name: Finalize Instagram Content Factory Phase 2 quality patch

on:
  push:
    branches: [feature/instagram-content-factory-phase2-constituency]
    paths: [.github/workflows/instagram_factory_phase2_quality_patch.yml]

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase2-constituency

      - name: Align catalogue and remove temporary workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("instagram/catalogues/visual_types.yml")
          text = path.read_text(encoding="utf-8")
          marker = "recommended_item_count: {min: 2, max: 8}"
          if marker not in text:
              raise SystemExit("Horizontal bar catalogue marker not found")
          path.write_text(text.replace(marker, "recommended_item_count: {min: 2, max: 7}", 1), encoding="utf-8")
          PY
          git rm .github/workflows/instagram_factory_phase2_quality_patch.yml

      - name: Commit final quality alignment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram/catalogues/visual_types.yml
          git commit -m "fix(instagram): align horizontal bar catalogue limit"
          git push origin HEAD:feature/instagram-content-factory-phase2-constituency
