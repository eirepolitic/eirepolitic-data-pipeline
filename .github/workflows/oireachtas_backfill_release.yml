name: Release validated Oireachtas current-government backfill

on:
  push:
    branches:
      - backfill/oireachtas-current-government
    paths:
      - .github/workflows/oireachtas_backfill_release.yml

permissions:
  contents: read

concurrency:
  group: oireachtas-production-promotion
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_BATCH_ID: current-government-backfill-20260716-1
      OIREACHTAS_PUBLISH_ENABLED: ${{ vars.OIREACHTAS_PUBLISH_ENABLED || 'false' }}
      OIREACHTAS_PUBLISH_LATEST: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: backfill/oireachtas-current-government
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Confirm complete validated candidate and date coverage
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_reassemble_candidate.py \
            --batch-id "${OIREACHTAS_BATCH_ID}" \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            | tee candidate-before-release.json
          python - <<'PY'
          import io, json
          from pathlib import Path
          import boto3, pandas as pd
          from extract.oireachtas.io_s3 import get_bytes

          manifest = json.loads(Path('candidate-before-release.json').read_text())
          assert manifest.get('status') == 'validated', manifest
          required = manifest.get('required_tables') or []
          assert len(required) >= 31, len(required)
          assert not manifest.get('missing_tables'), manifest.get('missing_tables')
          assert not manifest.get('failed_tables'), manifest.get('failed_tables')
          assert not manifest.get('missing_objects'), manifest.get('missing_objects')

          s3 = boto3.client('s3', region_name='ca-central-1')
          checks = {
              'silver_speeches': ('debate_date', '2024-11-29'),
              'silver_member_votes': ('division_date', '2024-11-29'),
              'silver_questions': ('question_date', '2024-11-29'),
              'silver_debate_records': ('debate_date', '2024-11-29'),
          }
          results = {}
          for table, (date_col, requested_start) in checks.items():
              key = f'processed/oireachtas_unified/latest/csv/{table}.csv'
              body = get_bytes(s3, bucket='eirepolitic-data', key=key)
              df = pd.read_csv(io.BytesIO(body), dtype=str, keep_default_na=False)
              dates = pd.to_datetime(df[date_col], errors='coerce').dropna()
              assert not df.empty and not dates.empty, table
              results[table] = {
                  'rows': len(df),
                  'min_date': dates.min().date().isoformat(),
                  'max_date': dates.max().date().isoformat(),
                  'requested_start': requested_start,
              }
          Path('date-coverage.json').write_text(json.dumps(results, indent=2, sort_keys=True) + '\n')
          print(json.dumps(results, indent=2, sort_keys=True))
          PY
      - name: Promote validated backfill
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            promote --batch-id "${OIREACHTAS_BATCH_ID}" \
            | tee promotion-result.json
      - name: Verify live pointer and rollback target
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_LATEST=false python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            status | tee pointer-after-release.json
          python - <<'PY'
          import json
          from pathlib import Path
          expected = 'current-government-backfill-20260716-1'
          status = json.loads(Path('pointer-after-release.json').read_text())
          production = status.get('production') or {}
          previous = status.get('previous') or {}
          assert production.get('mode') == 'batch', production
          assert production.get('batch_id') == expected, production
          assert previous.get('mode') in {'batch', 'legacy_direct'}, previous
          print(json.dumps({'live_batch': expected, 'rollback': previous}, indent=2, sort_keys=True))
          PY
      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-backfill-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            candidate-before-release.json
            date-coverage.json
            promotion-result.json
            pointer-after-release.json
          if-no-files-found: warn
          retention-days: 365
