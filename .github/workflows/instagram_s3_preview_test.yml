name: Instagram S3 Preview Test (Manual)

on:
  workflow_dispatch:

concurrency:
  group: instagram-s3-preview-test
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preview_test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ca-central-1"
      S3_BUCKET: "eirepolitic-data"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render synthetic max-length campaign and upload S3 preview
        shell: bash
        run: |
          set -o pipefail
          CAMPAIGN_SLUG="member_profile_batch_v1"
          SPEC_PATH="instagram/campaigns/${CAMPAIGN_SLUG}/render_spec_fixture.yml"
          MAX_FIXTURE_DIR="generated_posts/${CAMPAIGN_SLUG}_max_length_fixture"
          MAX_FIXTURE_PATH="${MAX_FIXTURE_DIR}/member_profile_metrics_max_length.csv"
          MAX_FIXTURE_META="${MAX_FIXTURE_DIR}/member_profile_metrics_max_length.metadata.json"
          OUTPUT_ROOT=$(python -c 'import sys, yaml; spec=yaml.safe_load(open(sys.argv[1], encoding="utf-8")); print(spec.get("render", {}).get("output_root") or ("generated_posts/" + str(spec.get("campaign", "campaign"))))' "${SPEC_PATH}")
          SELECTED_CORNER="a"
          CORNER_B64="instagram/assets/corners/gpt/celtic_corner_gpt_v1_${SELECTED_CORNER}.png.b64"
          CORNER_PNG="instagram/assets/corners/gpt/celtic_corner_gpt_v1_${SELECTED_CORNER}.png"
          RUN_LABEL="run-${GITHUB_RUN_ID}"
          mkdir -p workflow_debug "${MAX_FIXTURE_DIR}"
          {
            echo "campaign_slug=${CAMPAIGN_SLUG}"
            echo "spec_path=${SPEC_PATH}"
            echo "output_root=${OUTPUT_ROOT}"
            echo "max_fixture_path=${MAX_FIXTURE_PATH}"
            echo "run_label=${RUN_LABEL}"
            echo "selected_corner=${SELECTED_CORNER}"
            echo "corner_b64=${CORNER_B64}"
            echo "corner_png=${CORNER_PNG}"
            echo "aws_region=${AWS_REGION}"
            python --version
            python process/instagram_build_max_length_fixture.py \
              --source-table "s3://${S3_BUCKET}/processed/members/member_profile_metrics_2025.csv" \
              --output "${MAX_FIXTURE_PATH}" \
              --metadata-output "${MAX_FIXTURE_META}" \
              --aws-region "${AWS_REGION}"
            cp "${MAX_FIXTURE_META}" workflow_debug/max_length_fixture_metadata.json
            python process/instagram_restore_base64_asset.py \
              --input "${CORNER_B64}" \
              --output "${CORNER_PNG}"
            python process/instagram_render_campaign.py \
              --campaign "${SPEC_PATH}" \
              --limit "1"
            python process/instagram_apply_corner_overlay.py \
              --output-root "${OUTPUT_ROOT}" \
              --asset "${CORNER_PNG}" \
              --size "150" \
              --margin-x "8" \
              --margin-y "8" \
              --opacity "0.88"
            python process/instagram_build_copy_pack.py \
              --review-table "${OUTPUT_ROOT}/review/review_table.csv" \
              --copy-dir "${OUTPUT_ROOT}/copy"
            python process/instagram_build_publish_queue.py \
              --copy-csv "${OUTPUT_ROOT}/copy/captions.csv" \
              --queue-dir "${OUTPUT_ROOT}/queue"
            python process/instagram_upload_preview_to_s3.py \
              --output-root "${OUTPUT_ROOT}" \
              --campaign-slug "${CAMPAIGN_SLUG}" \
              --run-label "${RUN_LABEL}" \
              --root-prefix "instagram/previews" \
              --public-read "false"
            python process/instagram_generate_preview_links.py \
              --campaign-slug "${CAMPAIGN_SLUG}" \
              --root-prefix "instagram/previews" \
              --output-root "${OUTPUT_ROOT}" \
              --output "${OUTPUT_ROOT}/preview_links.json"
            cp "${OUTPUT_ROOT}/preview_links.json" workflow_debug/preview_links.json
            python - "${OUTPUT_ROOT}/preview_links.json" "${MAX_FIXTURE_META}" >> "${GITHUB_STEP_SUMMARY}" <<'PY'
          import json
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8"))
          meta = json.load(open(sys.argv[2], encoding="utf-8"))
          print("## Instagram S3 preview links")
          print()
          print(f"- Campaign: `{data.get('campaign_slug')}`")
          print(f"- S3 prefix: `s3://{data.get('bucket')}/{data.get('prefix')}/`")
          print(f"- Link expiry: `{data.get('expires_in_days')}` days")
          print(f"- Synthetic max-length row: `{meta.get('selected_full_name')}` · `{meta.get('selected_constituency')}` · `{meta.get('selected_party')}`")
          review_url = data.get("review_index_url")
          if review_url:
              print(f"- [Open review index]({review_url})")
          print()
          print("### PNG previews")
          for item in data.get("png_urls", []):
              rel = item.get("relative_path")
              url = item.get("presigned_url")
              print(f"- [{rel}]({url})")
          print()
          print("Review only: this workflow does not publish, schedule, or approve Instagram content.")
          PY
          } 2>&1 | tee workflow_debug/s3_preview_test.log

      - name: Publish one-click preview branch
        shell: bash
        run: |
          set -euo pipefail
          CAMPAIGN_SLUG="member_profile_batch_v1"
          SPEC_PATH="instagram/campaigns/${CAMPAIGN_SLUG}/render_spec_fixture.yml"
          OUTPUT_ROOT=$(python -c 'import sys, yaml; spec=yaml.safe_load(open(sys.argv[1], encoding="utf-8")); print(spec.get("render", {}).get("output_root") or ("generated_posts/" + str(spec.get("campaign", "campaign"))))' "${SPEC_PATH}")
          PREVIEW_BRANCH="instagram-preview-output"
          PREVIEW_DIR="preview"
          rm -rf /tmp/instagram-preview-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PREVIEW_BRANCH}:${PREVIEW_BRANCH}"
            git worktree add /tmp/instagram-preview-worktree "${PREVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/instagram-preview-worktree HEAD
            git -C /tmp/instagram-preview-worktree switch --orphan "${PREVIEW_BRANCH}"
            git -C /tmp/instagram-preview-worktree rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "/tmp/instagram-preview-worktree/${PREVIEW_DIR}"
          rm -rf "/tmp/instagram-preview-worktree/${PREVIEW_DIR:?}/"*
          cp -R "${OUTPUT_ROOT}/." "/tmp/instagram-preview-worktree/${PREVIEW_DIR}/"
          python - "/tmp/instagram-preview-worktree/README.md" "${GITHUB_REPOSITORY}" "${PREVIEW_BRANCH}" "${PREVIEW_DIR}" "/tmp/instagram-preview-worktree/${PREVIEW_DIR}/png" <<'PY'
          import sys
          from pathlib import Path

          readme_path = Path(sys.argv[1])
          repo = sys.argv[2]
          branch = sys.argv[3]
          preview_dir = sys.argv[4]
          png_dir = Path(sys.argv[5])
          pngs = sorted(p.name for p in png_dir.glob("*.png"))
          lines = [
              "# Instagram preview output",
              "",
              "This branch is machine-updated by the review-only Instagram S3 preview workflow.",
              "",
              "Latest review index:",
              f"https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/review/review_index.html",
              "",
              "Latest PNG previews:",
          ]
          if pngs:
              for name in pngs:
                  lines.append(f"https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/png/{name}")
          else:
              lines.append("No PNG previews found.")
          lines += [
              "",
              "Review only: this does not publish, schedule, or approve Instagram content.",
              "",
          ]
          readme_path.write_text("\n".join(lines), encoding="utf-8")
          PY
          git -C /tmp/instagram-preview-worktree add .
          git -C /tmp/instagram-preview-worktree commit -m "Update Instagram preview output for run ${GITHUB_RUN_ID}" || true
          git -C /tmp/instagram-preview-worktree push origin "${PREVIEW_BRANCH}"
          {
            echo "## One-click GitHub preview links"
            echo
            echo "- [Open latest review index](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PREVIEW_DIR}/review/review_index.html)"
            find "${OUTPUT_ROOT}/png" -maxdepth 1 -type f -name '*.png' -printf '%f\n' | sort | while read -r png_name; do
              echo "- [Open ${png_name}](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PREVIEW_DIR}/png/${png_name})"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload local copy of preview outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-s3-preview-test-output
          path: |
            generated_posts/**
            workflow_debug/
          if-no-files-found: warn
