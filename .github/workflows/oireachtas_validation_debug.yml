name: Oireachtas validation diagnostics

on:
  push:
    branches:
      - validation/oireachtas-reality-checks
    paths:
      - .github/workflows/oireachtas_validation_debug.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/oireachtas-reality-checks
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture test output
        shell: bash
        run: |
          set +e
          python -m pytest -vv tests/test_oireachtas_validation_framework.py > validation_debug.log 2>&1
          status=$?
          echo "exit_status=${status}" >> validation_debug.log
          cat validation_debug.log
          exit 0
      - name: Commit diagnostic output
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs
          mv validation_debug.log docs/oireachtas_validation_debug.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_validation_debug.log
          git commit -m 'Record validation framework test diagnostics'
          git push origin HEAD:validation/oireachtas-reality-checks
