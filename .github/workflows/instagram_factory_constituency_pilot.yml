name: Instagram Content Factory constituency pilot

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: Data source for the real example
        required: true
        type: choice
        options: [local, s3]
        default: s3
  push:
    branches:
      - feature/instagram-content-factory-phase2-constituency
    paths:
      - "instagram/catalogues/**"
      - "instagram/factory/**"
      - "instagram/projects/constituency_issue_profile_v1/**"
      - "instagram/renderer/__init__.py"
      - "instagram/visuals/data_mappings/constituency_issue_counts.yml"
      - "process/instagram_factory.py"
      - "tests/test_instagram_factory.py"
      - ".github/workflows/instagram_factory_constituency_pilot.yml"

permissions:
  contents: write

concurrency:
  group: instagram-factory-constituency-pilot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      INSTAGRAM_VISUAL_S3_BUCKET: eirepolitic-data
      DATA_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.data_source || 'local' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests

      - name: Validate catalogues
        run: python process/instagram_factory.py validate-catalogues

      - name: Validate constituency project
        run: >-
          python process/instagram_factory.py validate-project
          --project instagram/projects/constituency_issue_profile_v1/project.yml

      - name: Run Content Factory tests
        run: python -m unittest tests.test_instagram_factory -v

      - name: Render complete-slide validation set
        run: |
          python process/instagram_factory.py render-tests \
            --project instagram/projects/constituency_issue_profile_v1/project.yml \
            --data-source "$DATA_SOURCE"

      - name: Publish project preview branch
        shell: bash
        run: |
          set -euo pipefail
          PREVIEW_BRANCH="instagram-preview-output"
          PROJECT_DIR="preview/factory/projects/constituency_issue_profile_v1"
          SOURCE_DIR="generated_factory_tests/constituency_issue_profile_v1"
          WORKTREE="/tmp/instagram-factory-preview-worktree"

          rm -rf "$WORKTREE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$PREVIEW_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$PREVIEW_BRANCH:$PREVIEW_BRANCH"
            git worktree add "$WORKTREE" "$PREVIEW_BRANCH"
          else
            git worktree add --detach "$WORKTREE" HEAD
            git -C "$WORKTREE" switch --orphan "$PREVIEW_BRANCH"
            git -C "$WORKTREE" rm -rf . >/dev/null 2>&1 || true
          fi

          rm -rf "$WORKTREE/$PROJECT_DIR"
          mkdir -p "$WORKTREE/$PROJECT_DIR"
          cp -R "$SOURCE_DIR/." "$WORKTREE/$PROJECT_DIR/"

          python - "$WORKTREE/$PROJECT_DIR/README.md" "$GITHUB_REPOSITORY" "$PREVIEW_BRANCH" "$PROJECT_DIR" "$DATA_SOURCE" "$GITHUB_RUN_ID" <<'PY'
          from pathlib import Path
          import sys

          output, repo, branch, project_dir, data_source, run_id = sys.argv[1:7]
          root = Path(output).parent
          lines = [
              "# Constituency issue profile validation",
              "",
              f"Data source: `{data_source}`",
              f"Workflow run: `{run_id}`",
              "Review state: `needs_review`",
              "Publishing approval: `false`",
              "",
              "## Scenario contact sheets",
          ]
          for scenario in ("minimum", "maximum", "real_example"):
              lines.append(
                  f"- {scenario}: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/{scenario}/contact_sheet.png"
              )
          lines += ["", "## Slide contact sheets"]
          for slide_id in ("cover", "issue_profile"):
              lines.append(
                  f"- {slide_id}: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/contact_sheets/{slide_id}.png"
              )
          lines += [
              "",
              "## Manifests",
              f"- project: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/project_validation_manifest.json",
              f"- minimum: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/minimum/scenario_manifest.json",
              f"- maximum: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/maximum/scenario_manifest.json",
              f"- real example: https://raw.githubusercontent.com/{repo}/{branch}/{project_dir}/real_example/scenario_manifest.json",
              "",
              "Synthetic minimum and maximum outputs are non-publication test artifacts. The real example also requires explicit factual and visual approval.",
              "",
          ]
          Path(output).write_text("\n".join(lines), encoding="utf-8")
          PY

          git -C "$WORKTREE" add "$PROJECT_DIR"
          git -C "$WORKTREE" commit -m "Update constituency factory preview for run $GITHUB_RUN_ID" || true
          git -C "$WORKTREE" push origin "$PREVIEW_BRANCH"

          {
            echo "## Constituency Content Factory preview"
            echo
            echo "- Data source: \`$DATA_SOURCE\`"
            echo "- Scenario contact sheets:"
            echo "  - minimum: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/minimum/contact_sheet.png"
            echo "  - maximum: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/maximum/contact_sheet.png"
            echo "  - real example: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/real_example/contact_sheet.png"
            echo "- Slide contact sheets:"
            echo "  - cover: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/contact_sheets/cover.png"
            echo "  - issue profile: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/contact_sheets/issue_profile.png"
            echo "- Project manifest: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PROJECT_DIR}/project_validation_manifest.json"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: constituency-issue-profile-validation-${{ env.DATA_SOURCE }}
          path: generated_factory_tests/constituency_issue_profile_v1/
          if-no-files-found: error
