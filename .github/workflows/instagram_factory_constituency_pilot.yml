name: Instagram Content Factory constituency pilot

on:
  workflow_dispatch:
    inputs:
      data_source:
        description: Data source for validation and draft batch generation
        required: true
        type: choice
        options: [local, s3]
        default: s3
  push:
    branches:
      - feature/instagram-content-factory-phase2-constituency
      - feature/instagram-content-factory-phase3-batch
    paths:
      - "instagram/catalogues/**"
      - "instagram/factory/**"
      - "instagram/projects/constituency_issue_profile_v1/**"
      - "instagram/renderer/**"
      - "instagram/visuals/**"
      - "process/instagram_factory.py"
      - "tests/test_instagram_factory*.py"
      - ".github/workflows/instagram_factory_constituency_pilot.yml"

permissions:
  contents: write

concurrency:
  group: instagram-factory-constituency-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-render-and-batch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      AWS_DEFAULT_REGION: ca-central-1
      INSTAGRAM_VISUAL_S3_BUCKET: eirepolitic-data
      DATA_SOURCE: ${{ github.event_name == 'workflow_dispatch' && inputs.data_source || 'local' }}
      PROJECT_PATH: instagram/projects/constituency_issue_profile_v1/project.yml
      BATCH_ROOT: generated_factory_batches/constituency_issue_profile_v1
      S3_PROJECT_PREFIX: processed/instagram_factory/projects/constituency_issue_profile_v1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Validate catalogues and project
        run: |
          python process/instagram_factory.py validate-catalogues
          python process/instagram_factory.py validate-project --project "$PROJECT_PATH"
      - name: Run Content Factory tests
        id: tests
        shell: bash
        run: |
          set +e
          python -m unittest tests.test_instagram_factory tests.test_instagram_factory_batch -v 2>&1 | tee phase3_test_output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Commit temporary traceback
        if: failure() && steps.tests.outputs.status != '0'
        shell: bash
        run: |
          mkdir -p diagnostics
          cp phase3_test_output.log diagnostics/instagram_factory_phase3_test_output.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/instagram_factory_phase3_test_output.log
          git commit -m "chore(instagram): capture current Phase 3 traceback" || true
          git push origin HEAD:feature/instagram-content-factory-phase3-batch
      - name: Render complete-slide validation set
        run: >-
          python process/instagram_factory.py render-tests
          --project "$PROJECT_PATH"
          --data-source "$DATA_SOURCE"
      - name: Generate local draft batch
        if: env.DATA_SOURCE == 'local'
        run: >-
          python process/instagram_factory.py generate-batch
          --project "$PROJECT_PATH"
          --data-source local
          --git-sha "$GITHUB_SHA"
          --workflow-run-id "$GITHUB_RUN_ID"
      - name: Generate and upload live S3 draft batch
        if: env.DATA_SOURCE == 's3'
        run: >-
          python process/instagram_factory.py generate-batch
          --project "$PROJECT_PATH"
          --data-source s3
          --git-sha "$GITHUB_SHA"
          --workflow-run-id "$GITHUB_RUN_ID"
          --s3-bucket "$INSTAGRAM_VISUAL_S3_BUCKET"
          --s3-prefix "$S3_PROJECT_PREFIX"
      - name: Resolve generated run directory
        id: batch
        shell: bash
        run: |
          set -euo pipefail
          RUN_DIR=$(find "$BATCH_ROOT" -mindepth 1 -maxdepth 1 -type d | sort | head -n 1)
          test -n "$RUN_DIR"
          RUN_ID=$(basename "$RUN_DIR")
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Upload draft batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: constituency-draft-batch-${{ steps.batch.outputs.run_id }}
          path: ${{ steps.batch.outputs.run_dir }}/
          if-no-files-found: error
