name: Fix Oireachtas checkpoint 2 validator

on:
  push:
    branches:
      - validation/oireachtas-reality-checks
    paths:
      - .github/workflows/oireachtas_validation_checkpoint2_fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/oireachtas-reality-checks
          fetch-depth: 0
      - name: Apply narrow comparison fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('process/oireachtas_validate_reference_members.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '        selected = select_current(bridge, value_col, start_col, end_col)\n': '        member_side = members_df[["member_code", member_col]].rename(columns={member_col: "__member_value"})\n        bridge_side = select_current(bridge, value_col, start_col, end_col).rename(columns={value_col: "__bridge_value"})\n',
              '        merged = members_df[["member_code", member_col]].merge(selected, on="member_code", how="left", suffixes=("_member", "_bridge"))\n': '        merged = member_side.merge(bridge_side, on="member_code", how="left")\n',
              '        left = merged[f"{member_col}_member"].fillna("").astype(str).map(normalize_text)\n': '        left = merged["__member_value"].fillna("").astype(str).map(normalize_text)\n',
              '        right = merged[f"{value_col}_bridge"].fillna("").astype(str).map(normalize_text)\n': '        right = merged["__bridge_value"].fillna("").astype(str).map(normalize_text)\n',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'missing target line: {old!r}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add process/oireachtas_validate_reference_members.py
          git commit -m 'Fix checkpoint 2 member bridge comparison'
          git push origin HEAD:validation/oireachtas-reality-checks
