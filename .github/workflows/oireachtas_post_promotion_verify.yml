name: Oireachtas post-promotion verification

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_post_promotion_verify.yml

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      REVIEW_OUTPUT_ROOT: post_promotion_review
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Verify live pointer
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status \
            | tee live-pointer.json
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('live-pointer.json').read_text())
          production = status.get('production') or {}
          previous = status.get('previous') or {}
          assert production.get('mode') == 'batch', production
          assert production.get('batch_id') == 'batch6-validation-29519369155-1', production
          assert previous.get('mode') in {'legacy_direct', 'batch'}, previous
          PY
      - name: Validate live downstream contracts
        shell: bash
        run: |
          set -euo pipefail
          python process/oireachtas_validate_downstream_contracts.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --contract members_compat \
            --contract member_votes_compat \
            --contract member_photo_urls \
            --contract member_summaries \
            --contract constituency_images \
            --contract debate_issue_labels \
            --output live-contracts.json
      - name: Verify live compatibility and mismatch review
        shell: bash
        run: |
          set -euo pipefail
          python -m extract.oireachtas.compat_comparison | tee live-compatibility.log
          python -m extract.oireachtas.mismatch_review | tee live-mismatch.log
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-post-promotion-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            live-pointer.json
            live-contracts.json
            live-compatibility.log
            live-mismatch.log
            post_promotion_review/**
          if-no-files-found: warn
          retention-days: 365
