name: Generate Instagram Template Test Post (Manual)

on:
  workflow_dispatch:
    inputs:
      constituency:
        description: "Constituency name"
        required: true
        default: "Dublin Bay South"
      member_name:
        description: "Optional TD full name override"
        required: false
        default: ""
      provider:
        description: "Render provider"
        required: true
        default: "bannerbear"
      spec_path:
        description: "YAML spec path"
        required: true
        default: "instagram/specs/bannerbear_constituency_test.yml"

concurrency:
  group: instagram-template-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_post:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: "eirepolitic-data"
      BANNERBEAR_API_KEY: ${{ secrets.BANNERBEAR_API_KEY }}
      BANNERBEAR_TEMPLATE_UID_OVERVIEW: ${{ secrets.BANNERBEAR_TEMPLATE_UID_OVERVIEW }}
      BANNERBEAR_TEMPLATE_UID_MEMBER_PROFILE: ${{ secrets.BANNERBEAR_TEMPLATE_UID_MEMBER_PROFILE }}
      BANNERBEAR_TEMPLATE_UID_TOP_ISSUES: ${{ secrets.BANNERBEAR_TEMPLATE_UID_TOP_ISSUES }}
      BANNERBEAR_TEMPLATE_UID_GLOSSARY: ${{ secrets.BANNERBEAR_TEMPLATE_UID_GLOSSARY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Render template-driven constituency test post
        run: |
          python process/instagram_template_pipeline.py \
            --spec "${{ inputs.spec_path }}" \
            --provider "${{ inputs.provider }}" \
            --constituency "${{ inputs.constituency }}" \
            --member-name "${{ inputs.member_name }}"

      - name: Upload generated post artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-test
          path: generated_posts/
          if-no-files-found: error
