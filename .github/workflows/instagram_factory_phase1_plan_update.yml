name: Finalize Instagram Content Factory Phase 1 plan

on:
  push:
    branches: [feature/instagram-content-factory-phase1]
    paths: [.github/workflows/instagram_factory_phase1_plan_update.yml]

permissions:
  contents: write

jobs:
  update-plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-content-factory-phase1

      - name: Mark Phase 1 complete in canonical plan
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("instagram/CONTENT_FACTORY_PLAN.md")
          text = path.read_text(encoding="utf-8")

          phase_heading = "### Phase 1 — catalogues and project schema\n\nBuild:"
          phase_replacement = (
              "### Phase 1 — catalogues and project schema\n\n"
              "**Status: completed (2026-07-19) on `feature/instagram-content-factory-phase1`.**\n\n"
              "Implemented:\n\n"
              "- post, visual, and metric catalogues\n"
              "- deterministic catalogue validation and option listing\n"
              "- first reusable project specification template\n"
              "- deterministic project validation with catalogue compatibility checks\n"
              "- focused unit tests and GitHub Actions validation\n\n"
              "Build:"
          )
          if phase_heading not in text:
              raise SystemExit("Phase 1 heading marker not found")
          text = text.replace(phase_heading, phase_replacement, 1)

          immediate_heading = "## 18. Immediate next development tasks\n\nRecommended order for the next chat instance:"
          immediate_replacement = (
              "## 18. Immediate next development tasks\n\n"
              "Phase 1 is complete. The next milestone is Phase 2 complete-slide testing.\n\n"
              "Recommended order for the next chat instance:"
          )
          if immediate_heading not in text:
              raise SystemExit("Immediate tasks marker not found")
          text = text.replace(immediate_heading, immediate_replacement, 1)

          old_tasks = (
              "3. Create the post/visual/metric catalogues from existing layouts, visual templates, and validated data mappings.\n"
              "4. Add catalogue validation and a command to list menu options.\n"
              "5. Define the first `instagram/projects/_template/project.yml` schema.\n"
              "6. Implement project validation.\n"
              "7. Choose one simple pilot project, preferably constituency or member grain with two slides.\n"
              "8. Implement min/max/real complete-slide testing for the pilot.\n"
              "9. Review and refine before building batch mode.\n"
              "10. Add S3 project storage only after the pilot test flow is approved."
          )
          new_tasks = (
              "3. Inspect the completed catalogues, validators, and project template; do not duplicate them.\n"
              "4. Choose one simple pilot project, preferably constituency or member grain with two slides.\n"
              "5. Implement the min/max/real scenario builder for the pilot.\n"
              "6. Integrate standalone visual assets into complete post-layout slots.\n"
              "7. Render complete-slide test sets and contact sheets.\n"
              "8. Add factual real-example validation manifests.\n"
              "9. Review and refine before building batch mode.\n"
              "10. Add S3 project storage only after the pilot test flow is approved."
          )
          if old_tasks not in text:
              raise SystemExit("Immediate task list marker not found")
          text = text.replace(old_tasks, new_tasks, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit canonical plan update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add instagram/CONTENT_FACTORY_PLAN.md
          git commit -m "docs(instagram): mark content factory phase 1 complete"
          git push origin HEAD:feature/instagram-content-factory-phase1
