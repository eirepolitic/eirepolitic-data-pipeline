name: Instagram Template Render Test (Manual)

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template ID without .json"
        required: false
        default: "title_two_visuals_draft_v1"
      palette:
        description: "Palette ID without .json"
        required: false
        default: "eirepolitic_dark"

concurrency:
  group: instagram-template-render-test
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render_template:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OUTPUT_ROOT: "generated_posts/template_render_test"
      PREVIEW_BRANCH: "instagram-preview-output"
      PREVIEW_DIR: "preview"
      CORNER_B64: "instagram/assets/corners/gpt/celtic_corner_gpt_v1_b.png.b64"
      CORNER_PNG: "instagram/assets/corners/gpt/celtic_corner_gpt_v1_b.png"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build example bindings
        shell: bash
        run: |
          set -euo pipefail
          TEMPLATE="${{ inputs.template }}"
          TEMPLATE="${TEMPLATE:-title_two_visuals_draft_v1}"
          mkdir -p "${OUTPUT_ROOT}/metadata/bindings" "${OUTPUT_ROOT}/metadata/assets" "${OUTPUT_ROOT}/png" workflow_debug
          python - "${OUTPUT_ROOT}" "${TEMPLATE}" <<'PY'
          import sys
          from pathlib import Path
          import yaml
          from PIL import Image, ImageDraw

          output_root = Path(sys.argv[1])
          template = sys.argv[2]
          assets = output_root / "metadata" / "assets"
          visual_1 = assets / "two_visuals_sample_1.png"
          visual_2 = assets / "two_visuals_sample_2.png"

          img1 = Image.new("RGB", (840, 390), "#102a22")
          d1 = ImageDraw.Draw(img1)
          for y in range(70, 340, 65):
              d1.line((60, y, 780, y), fill="#35564a", width=2)
          bars = [(110, 260), (230, 220), (350, 180), (470, 140), (590, 105)]
          for x, top in bars:
              d1.rectangle((x, top, x + 75, 330), fill="#d8c690")
          d1.text((55, 30), "Sample poll movement", fill="#f2e6b8")
          img1.save(visual_1)

          img2 = Image.new("RGB", (840, 300), "#102a22")
          d2 = ImageDraw.Draw(img2)
          d2.rectangle((70, 70, 770, 230), outline="#35564a", width=4)
          d2.line((100, 205, 235, 170, 370, 160, 505, 120, 640, 95, 735, 82), fill="#f2e6b8", width=6)
          for x, y in [(100,205),(235,170),(370,160),(505,120),(640,95),(735,82)]:
              d2.ellipse((x-8, y-8, x+8, y+8), fill="#d8c690")
          d2.text((55, 30), "Sample trend line", fill="#f2e6b8")
          img2.save(visual_2)

          bindings_path = output_root / "metadata" / "bindings" / f"{template}.yml"
          bindings = {
              "bindings": {
                  "slide_title": "Two Visuals, One Political Story",
                  "visual_1": str(visual_1),
                  "visual_1_caption": "First visual: support rises across the sample period.",
                  "visual_2": str(visual_2),
                  "visual_2_caption": "Second visual: trend direction is confirmed by later data."
              }
          }
          bindings_path.write_text(yaml.safe_dump(bindings, sort_keys=False, allow_unicode=True), encoding="utf-8")
          print(f"bindings_path={bindings_path}")
          print(f"visual_1={visual_1}")
          print(f"visual_2={visual_2}")
          PY
          echo "TEMPLATE=${TEMPLATE}" >> "${GITHUB_ENV}"

      - name: Restore standard corner asset
        shell: bash
        run: |
          set -euo pipefail
          python process/instagram_restore_base64_asset.py \
            --input "${CORNER_B64}" \
            --output "${CORNER_PNG}" \
            --verify-image | tee workflow_debug/corner_asset_restore.json

      - name: Render template with fake bindings
        shell: bash
        run: |
          set -euo pipefail
          PALETTE="${{ inputs.palette }}"
          PALETTE="${PALETTE:-eirepolitic_dark}"
          python process/instagram_render_template.py \
            --template "instagram/templates/layouts/${TEMPLATE}.json" \
            --bindings "${OUTPUT_ROOT}/metadata/bindings/${TEMPLATE}.yml" \
            --palette "${PALETTE}" \
            --output "${OUTPUT_ROOT}/png/${TEMPLATE}.png" | tee workflow_debug/template_render.log

      - name: Apply standard corner overlay
        shell: bash
        run: |
          set -euo pipefail
          python process/instagram_apply_corner_overlay.py \
            --output-root "${OUTPUT_ROOT}" \
            --asset "${CORNER_PNG}" \
            --size "150" \
            --margin-x "8" \
            --margin-y "8" \
            --opacity "0.88" | tee workflow_debug/corner_overlay_manifest.json

      - name: Publish one-click preview branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/instagram-preview-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PREVIEW_BRANCH}:${PREVIEW_BRANCH}"
            git worktree add /tmp/instagram-preview-worktree "${PREVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/instagram-preview-worktree HEAD
            git -C /tmp/instagram-preview-worktree switch --orphan "${PREVIEW_BRANCH}"
            git -C /tmp/instagram-preview-worktree rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p "/tmp/instagram-preview-worktree/${PREVIEW_DIR}"
          rm -rf "/tmp/instagram-preview-worktree/${PREVIEW_DIR:?}/"*
          cp -R "${OUTPUT_ROOT}/." "/tmp/instagram-preview-worktree/${PREVIEW_DIR}/"
          python - "/tmp/instagram-preview-worktree/README.md" "${GITHUB_REPOSITORY}" "${PREVIEW_BRANCH}" "${PREVIEW_DIR}" "${TEMPLATE}" <<'PY'
          import sys
          from pathlib import Path
          readme_path = Path(sys.argv[1])
          repo = sys.argv[2]
          branch = sys.argv[3]
          preview_dir = sys.argv[4]
          template = sys.argv[5]
          readme_path.write_text("\n".join([
              "# Instagram template preview output",
              "",
              "Latest template preview:",
              f"https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/png/{template}.png",
              "",
              "Review only: this does not publish, schedule, or approve Instagram content.",
              "",
          ]), encoding="utf-8")
          PY
          git -C /tmp/instagram-preview-worktree add .
          git -C /tmp/instagram-preview-worktree commit -m "Update template render preview for run ${GITHUB_RUN_ID}" || true
          git -C /tmp/instagram-preview-worktree push origin "${PREVIEW_BRANCH}"

      - name: Upload rendered template
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-render-test-output
          path: |
            generated_posts/template_render_test/
            workflow_debug/
          if-no-files-found: warn
