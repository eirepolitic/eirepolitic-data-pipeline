name: Instagram Template Render Test (Manual)

on:
  workflow_dispatch:
    inputs:
      bindings:
        description: "Bindings/spec YAML path"
        required: true
        default: "instagram/specs/template_render_test.yml"
      output:
        description: "Optional output PNG path override"
        required: false
        default: ""

concurrency:
  group: instagram-template-render-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_template:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render template
        run: |
          if [ -n "${{ inputs.output }}" ]; then
            python process/instagram_render_template.py --bindings "${{ inputs.bindings }}" --output "${{ inputs.output }}"
          else
            python process/instagram_render_template.py --bindings "${{ inputs.bindings }}"
          fi

      - name: Upload generated output
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-render-test
          path: |
            generated_posts/**
            generated_media/**
          if-no-files-found: error
