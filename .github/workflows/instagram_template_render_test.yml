name: Instagram Template Render Test (Manual)

on:
  workflow_dispatch:
    inputs:
      template:
        description: "Template ID without .json"
        required: false
        default: "profile_card_v1"
      palette:
        description: "Palette ID without .json"
        required: false
        default: "eirepolitic_dark"

concurrency:
  group: instagram-template-render-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  render_template:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Render template with fake bindings
        shell: bash
        run: |
          set -o pipefail
          TEMPLATE="${{ inputs.template }}"
          PALETTE="${{ inputs.palette }}"
          TEMPLATE="${TEMPLATE:-profile_card_v1}"
          PALETTE="${PALETTE:-eirepolitic_dark}"
          mkdir -p workflow_debug
          {
            echo "template=${TEMPLATE}"
            echo "palette=${PALETTE}"
            python --version
            python process/instagram_render_template.py \
              --template "instagram/templates/layouts/${TEMPLATE}.json" \
              --bindings "instagram/specs/template_render_test.yml" \
              --palette "${PALETTE}" \
              --output "generated_posts/template_render_test/png/${TEMPLATE}.png"
          } 2>&1 | tee workflow_debug/template_render.log

      - name: Upload rendered template
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-template-render-test-output
          path: |
            generated_posts/template_render_test/
            workflow_debug/
          if-no-files-found: warn
