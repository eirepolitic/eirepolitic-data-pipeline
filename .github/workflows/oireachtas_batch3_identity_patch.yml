name: Oireachtas Batch 3 identity patch

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - process/apply_oireachtas_batch3_identity_patch.py
      - .github/workflows/oireachtas_batch3_identity_patch.yml

permissions:
  contents: write

concurrency:
  group: oireachtas-batch3-identity-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply deterministic identity edits
        shell: bash
        run: |
          set -euo pipefail
          python process/apply_oireachtas_batch3_identity_patch.py
      - name: Commit identity edits
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No identity changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extract/oireachtas
          git commit -m 'Stabilize Oireachtas history fallback identifiers'
          git push origin HEAD:repair/oireachtas-production-hardening
