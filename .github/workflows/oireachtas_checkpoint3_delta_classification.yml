name: Oireachtas checkpoint 3 delta classification

on:
  push:
    branches:
      - validation/oireachtas-reality-checks
    paths:
      - process/oireachtas_classify_proceedings_deltas.py
      - .github/workflows/oireachtas_checkpoint3_delta_classification.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: validation/oireachtas-reality-checks
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Classify proceedings deltas
        id: classify
        shell: bash
        run: |
          set +e
          mkdir -p oireachtas_validation_output/checkpoint3_delta
          python process/oireachtas_classify_proceedings_deltas.py \
            --bucket "${S3_BUCKET}" \
            --region "${AWS_REGION}" \
            --output-dir oireachtas_validation_output/checkpoint3_delta \
            > checkpoint3_delta_console.log 2>&1
          status=$?
          cat checkpoint3_delta_console.log
          echo "exit_status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Commit report and diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p docs/oireachtas_validation/checkpoint3_delta
          cp checkpoint3_delta_console.log docs/oireachtas_validation/checkpoint3_delta/console.log
          if compgen -G 'oireachtas_validation_output/checkpoint3_delta/*' > /dev/null; then
            cp oireachtas_validation_output/checkpoint3_delta/* docs/oireachtas_validation/checkpoint3_delta/
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin validation/oireachtas-reality-checks
          git add docs/oireachtas_validation/checkpoint3_delta
          if git diff --cached --quiet; then
            echo 'No report changes.'
          else
            git commit -m 'Record checkpoint 3 delta classification'
            git push origin HEAD:validation/oireachtas-reality-checks
          fi
      - name: Enforce successful execution
        shell: bash
        run: |
          set -euo pipefail
          test '${{ steps.classify.outputs.exit_status }}' = '0'
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-checkpoint3-delta-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            oireachtas_validation_output/checkpoint3_delta/**
            checkpoint3_delta_console.log
          if-no-files-found: warn
          retention-days: 365
