name: Instagram Media Generator Test (Manual)

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to test, or all"
        required: false
        default: "all"
      test_case:
        description: "Specific test case or all"
        required: false
        default: "all"

concurrency:
  group: instagram-media-test
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  media_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run media generator fake-data cases
        shell: bash
        run: |
          set -o pipefail
          GENERATOR="${{ inputs.generator }}"
          TEST_CASE="${{ inputs.test_case }}"
          GENERATOR="${GENERATOR:-all}"
          TEST_CASE="${TEST_CASE:-all}"
          mkdir -p workflow_debug
          {
            echo "generator=${GENERATOR}"
            echo "test_case=${TEST_CASE}"
            python --version
            python process/instagram_generate_media.py \
              --generator "${GENERATOR}" \
              --test-case "${TEST_CASE}"
          } 2>&1 | tee workflow_debug/media_test.log

      - name: Prepare fixture visual data mapping
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug generated_visual_data
          python process/instagram_prepare_visual_data.py \
            --config "instagram/visuals/data_mappings/fixture_issue_counts_local.yml" \
            2>&1 | tee workflow_debug/visual_data_prepare.log

      - name: Render draft visual samples
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug
          VISUAL_IDS="horizontal_bar_draft_v1 vertical_bar_draft_v1 line_chart_draft_v1 stacked_bar_draft_v1 ranking_table_draft_v1 choropleth_map_draft_v1 point_map_draft_v1 table_card_draft_v1 small_multiples_draft_v1 area_chart_draft_v1 scatter_plot_draft_v1 dot_plot_draft_v1 lollipop_chart_draft_v1 slope_chart_draft_v1 donut_chart_draft_v1 tile_map_draft_v1 sourced_image_asset_draft_v1"
          for visual_id in ${VISUAL_IDS}; do
            python process/instagram_render_visual.py \
              --sample "instagram/visuals/samples/${visual_id}.sample.yml" \
              --output-root "generated_visuals/${visual_id}"
          done 2>&1 | tee workflow_debug/visual_preview.log

      - name: Render visual variation test packs
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug
          VISUAL_IDS="horizontal_bar_draft_v1 vertical_bar_draft_v1 line_chart_draft_v1 stacked_bar_draft_v1 ranking_table_draft_v1 choropleth_map_draft_v1 point_map_draft_v1 table_card_draft_v1 small_multiples_draft_v1 area_chart_draft_v1 scatter_plot_draft_v1 dot_plot_draft_v1 lollipop_chart_draft_v1 slope_chart_draft_v1 donut_chart_draft_v1 tile_map_draft_v1 sourced_image_asset_draft_v1"
          for visual_id in ${VISUAL_IDS}; do
            python process/instagram_render_visual_test_pack.py \
              --registry "instagram/visuals/tests/${visual_id}/cases.yml" \
              --output-root "generated_visual_tests/${visual_id}"
          done 2>&1 | tee workflow_debug/visual_test_pack.log

      - name: Try mapped S3 visual smoke render
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug generated_visual_data generated_visuals/s3_smoke
          STATUS_PATH="generated_visual_data/s3_smoke_status.json"

          write_status () {
            local status="$1"
            local exit_code="$2"
            local message="$3"
            python - "$STATUS_PATH" "$status" "$exit_code" "$message" <<'PY'
          import json
          import os
          import sys
          from datetime import datetime, timezone

          path, status, exit_code, message = sys.argv[1:5]
          payload = {
              "success": status == "succeeded",
              "status": status,
              "exit_code": int(exit_code),
              "message": message,
              "created_at": datetime.now(timezone.utc).isoformat(),
              "review_only": True,
              "publishes_content": False,
              "bucket": "eirepolitic-data",
              "region": "ca-central-1",
              "preview_path": "preview/visuals/smoke/s3",
              "outputs": {
                  "schema_profile": "generated_visual_data/s3_schema_profile.json",
                  "schema_profile_summary": "generated_visual_data/s3_schema_profile.md",
                  "mapping_readiness": "generated_visual_data/s3_mapping_readiness.json",
                  "mapping_readiness_summary": "generated_visual_data/s3_mapping_readiness.md",
                  "debate_issue_counts_manifest": "generated_visual_data/debate_issue_counts_s3.manifest.json",
                  "member_party_counts_manifest": "generated_visual_data/member_party_counts_s3.manifest.json",
                  "smoke_samples_manifest": "generated_visuals/s3_smoke/smoke_samples.manifest.json",
                  "debate_issues_horizontal_bar_root": "generated_visuals/s3_smoke/debate_issues_horizontal_bar",
                  "debate_issues_vertical_bar_root": "generated_visuals/s3_smoke/debate_issues_vertical_bar",
                  "member_parties_donut_chart_root": "generated_visuals/s3_smoke/member_parties_donut_chart",
                  "member_parties_horizontal_bar_root": "generated_visuals/s3_smoke/member_parties_horizontal_bar",
                  "contact_sheet": "generated_visuals/s3_smoke/contact_sheet.png",
                  "contact_sheet_manifest": "generated_visuals/s3_smoke/contact_sheet.manifest.json",
              },
          }
          os.makedirs(os.path.dirname(path), exist_ok=True)
          with open(path, "w", encoding="utf-8") as handle:
              json.dump(payload, handle, indent=2, ensure_ascii=False)
          PY
          }

          if [[ -z "${AWS_ACCESS_KEY_ID:-}" || -z "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "AWS credentials are not available. Skipping S3 visual smoke render." | tee workflow_debug/s3_visual_smoke_skipped.log
            write_status "skipped_missing_aws_credentials" 0 "AWS credentials were not available to this workflow run."
            exit 0
          fi

          set +e
          {
            set -e
            echo "AWS credentials detected. Running review-only S3 visual data mapping."
            python process/instagram_profile_s3_visual_data.py \
              --config "instagram/visuals/data_mappings/debate_issue_counts_s3.yml" \
              --config "instagram/visuals/data_mappings/member_party_counts_s3.yml" \
              --output "generated_visual_data/s3_schema_profile.json"
            python process/instagram_summarize_s3_schema_profile.py \
              --profile "generated_visual_data/s3_schema_profile.json" \
              --output "generated_visual_data/s3_schema_profile.md"
            python process/instagram_check_s3_mapping_readiness.py \
              --profile "generated_visual_data/s3_schema_profile.json" \
              --output-json "generated_visual_data/s3_mapping_readiness.json" \
              --output-markdown "generated_visual_data/s3_mapping_readiness.md" \
              --fail-on-not-ready
            python process/instagram_prepare_visual_data.py --config "instagram/visuals/data_mappings/debate_issue_counts_s3.yml"
            python process/instagram_prepare_visual_data.py --config "instagram/visuals/data_mappings/member_party_counts_s3.yml"
            python process/instagram_build_s3_smoke_contact_sheet.py \
              --input-root "generated_visuals/s3_smoke" \
              --output "generated_visuals/s3_smoke/contact_sheet.png"
          } 2>&1 | tee workflow_debug/s3_visual_smoke.log
          smoke_exit=${PIPESTATUS[0]}
          set -e

          if [[ "${smoke_exit}" -eq 0 ]]; then
            write_status "succeeded" 0 "Mapped S3 visual smoke render, schema profile, mapping readiness, schema summary, and contact sheet completed."
          else
            write_status "failed_non_blocking" "${smoke_exit}" "Mapped S3 visual smoke render or mapping readiness check failed; main fixture preview workflow continued."
          fi
          exit 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ca-central-1
          INSTAGRAM_VISUAL_S3_BUCKET: eirepolitic-data

      - name: Add S3 smoke status to workflow summary
        if: always()
        shell: bash
        run: |
          STATUS_PATH="generated_visual_data/s3_smoke_status.json"
          {
            echo "## S3 visual smoke status"
            echo
          } >> "${GITHUB_STEP_SUMMARY}"
          if [[ ! -f "${STATUS_PATH}" ]]; then
            {
              echo "Status file was not created."
              echo
              echo "Expected path: \`${STATUS_PATH}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          python - "${STATUS_PATH}" "${GITHUB_STEP_SUMMARY}" <<'PY'
          import json
          import sys
          from pathlib import Path

          status_path = Path(sys.argv[1])
          summary_path = Path(sys.argv[2])
          payload = json.loads(status_path.read_text(encoding="utf-8"))
          lines = [
              f"- Status: `{payload.get('status', 'unknown')}`",
              f"- Success: `{payload.get('success')}`",
              f"- Exit code: `{payload.get('exit_code')}`",
              f"- Message: {payload.get('message', '')}",
              f"- Bucket: `{payload.get('bucket', '')}`",
              f"- Region: `{payload.get('region', '')}`",
              f"- Status artifact: `{status_path}`",
              f"- Schema profile artifact: `generated_visual_data/s3_schema_profile.json`",
              f"- Schema profile summary: `generated_visual_data/s3_schema_profile.md`",
              f"- Mapping readiness artifact: `generated_visual_data/s3_mapping_readiness.json`",
              f"- Mapping readiness summary: `generated_visual_data/s3_mapping_readiness.md`",
              f"- Smoke samples manifest: `generated_visuals/s3_smoke/smoke_samples.manifest.json`",
              f"- Smoke preview path: `{payload.get('preview_path', 'preview/visuals/smoke/s3')}`",
              "",
              "Review-only: this does not publish, schedule, or approve Instagram content.",
              "",
          ]
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("\n".join(lines))
          PY

      - name: Publish visual preview branch
        shell: bash
        run: |
          set -euo pipefail
          PREVIEW_BRANCH="instagram-preview-output"
          PREVIEW_DIR="preview/visuals"
          S3_SMOKE_DIR="${PREVIEW_DIR}/smoke/s3"
          VISUAL_IDS="horizontal_bar_draft_v1 vertical_bar_draft_v1 line_chart_draft_v1 stacked_bar_draft_v1 ranking_table_draft_v1 choropleth_map_draft_v1 point_map_draft_v1 table_card_draft_v1 small_multiples_draft_v1 area_chart_draft_v1 scatter_plot_draft_v1 dot_plot_draft_v1 lollipop_chart_draft_v1 slope_chart_draft_v1 donut_chart_draft_v1 tile_map_draft_v1 sourced_image_asset_draft_v1"

          rm -rf /tmp/instagram-visual-preview-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PREVIEW_BRANCH}:${PREVIEW_BRANCH}"
            git worktree add /tmp/instagram-visual-preview-worktree "${PREVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/instagram-visual-preview-worktree HEAD
            git -C /tmp/instagram-visual-preview-worktree switch --orphan "${PREVIEW_BRANCH}"
            git -C /tmp/instagram-visual-preview-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}"
          rm -rf "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR:?}/"*

          for visual_id in ${VISUAL_IDS}; do
            SAMPLE_DIR="/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/samples/${visual_id}"
            TEST_DIR="/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/tests/${visual_id}"
            mkdir -p "${SAMPLE_DIR}/png" "${SAMPLE_DIR}/metadata" "${SAMPLE_DIR}/manifests"
            mkdir -p "${TEST_DIR}/png" "${TEST_DIR}/metadata" "${TEST_DIR}/manifests"
            cp -R "generated_visuals/${visual_id}/png/." "${SAMPLE_DIR}/png/"
            cp -R "generated_visuals/${visual_id}/metadata/." "${SAMPLE_DIR}/metadata/"
            cp -R "generated_visuals/${visual_id}/manifests/." "${SAMPLE_DIR}/manifests/"
            cp -R "generated_visual_tests/${visual_id}/png/." "${TEST_DIR}/png/"
            cp -R "generated_visual_tests/${visual_id}/metadata/." "${TEST_DIR}/metadata/"
            cp -R "generated_visual_tests/${visual_id}/manifests/." "${TEST_DIR}/manifests/"
            cp "generated_visual_tests/${visual_id}/contact_sheet.png" "${TEST_DIR}/contact_sheet.png"
            cp "generated_visual_tests/${visual_id}/test_pack_manifest.json" "${TEST_DIR}/test_pack_manifest.json"
          done

          mkdir -p "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/status"
          if [[ -f "generated_visual_data/s3_smoke_status.json" ]]; then
            cp "generated_visual_data/s3_smoke_status.json" "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/status/s3_smoke_status.json"
          fi

          S3_SMOKE_STATUS="missing"
          if [[ -f "generated_visual_data/s3_smoke_status.json" ]]; then
            S3_SMOKE_STATUS=$(python - <<'PY'
          import json
          from pathlib import Path
          path = Path("generated_visual_data/s3_smoke_status.json")
          print(json.loads(path.read_text(encoding="utf-8")).get("status", "unknown"))
          PY
          )
          fi

          mkdir -p "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data"
          cp generated_visual_data/*s3* "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data/" 2>/dev/null || true

          if [[ "${S3_SMOKE_STATUS}" == "succeeded" ]]; then
            mkdir -p "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/visuals"
            mkdir -p "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/contact_sheet"
            cp -R "generated_visuals/s3_smoke/." "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/visuals/"
            cp "generated_visuals/s3_smoke/contact_sheet.png" "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/contact_sheet/contact_sheet.png"
            cp "generated_visuals/s3_smoke/contact_sheet.manifest.json" "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/contact_sheet/contact_sheet.manifest.json"
          fi

          python - "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/README.md" "${GITHUB_REPOSITORY}" "${PREVIEW_BRANCH}" "${PREVIEW_DIR}" "${S3_SMOKE_STATUS}" <<'PY'
          import sys
          from pathlib import Path

          readme_path = Path(sys.argv[1])
          repo = sys.argv[2]
          branch = sys.argv[3]
          preview_dir = sys.argv[4]
          s3_smoke_status = sys.argv[5]
          root = readme_path.parent
          visual_ids = [
              "horizontal_bar_draft_v1",
              "vertical_bar_draft_v1",
              "line_chart_draft_v1",
              "stacked_bar_draft_v1",
              "ranking_table_draft_v1",
              "choropleth_map_draft_v1",
              "point_map_draft_v1",
              "table_card_draft_v1",
              "small_multiples_draft_v1",
              "area_chart_draft_v1",
              "scatter_plot_draft_v1",
              "dot_plot_draft_v1",
              "lollipop_chart_draft_v1",
              "slope_chart_draft_v1",
              "donut_chart_draft_v1",
              "tile_map_draft_v1",
              "sourced_image_asset_draft_v1",
          ]
          smoke_dirs = [
              ("debate issue horizontal bar PNGs", "debate_issues_horizontal_bar"),
              ("debate issue vertical bar PNGs", "debate_issues_vertical_bar"),
              ("member party donut PNGs", "member_parties_donut_chart"),
              ("member party horizontal bar PNGs", "member_parties_horizontal_bar"),
          ]
          lines = [
              "# Instagram visual preview output",
              "",
              "This folder is machine-updated by the review-only Instagram Media Generator Test workflow.",
              "",
              "Contact sheets:",
          ]
          for visual_id in visual_ids:
              lines.append(f"- {visual_id}: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/tests/{visual_id}/contact_sheet.png")
          lines += ["", "Sample PNGs:"]
          for visual_id in visual_ids:
              png_dir = root / "samples" / visual_id / "png"
              for png in sorted(png_dir.glob("*.png")):
                  lines.append(f"- {visual_id}/{png.name}: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/samples/{visual_id}/png/{png.name}")
          lines += [
              "",
              "S3 smoke preview:",
              f"- status: {s3_smoke_status}",
              f"- status JSON: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/status/s3_smoke_status.json",
          ]
          s3_data_dir = root / "smoke" / "s3" / "generated_visual_data"
          if (s3_data_dir / "s3_mapping_readiness.md").exists():
              lines.append(f"- mapping readiness summary: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/generated_visual_data/s3_mapping_readiness.md")
          if (s3_data_dir / "s3_mapping_readiness.json").exists():
              lines.append(f"- mapping readiness JSON: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/generated_visual_data/s3_mapping_readiness.json")
          if (s3_data_dir / "s3_schema_profile.md").exists():
              lines.append(f"- schema profile summary: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/generated_visual_data/s3_schema_profile.md")
          if (s3_data_dir / "s3_schema_profile.json").exists():
              lines.append(f"- schema profile JSON: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/generated_visual_data/s3_schema_profile.json")
          if s3_smoke_status == "succeeded":
              lines.append(f"- smoke contact sheet: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/contact_sheet/contact_sheet.png")
              lines.append(f"- smoke contact sheet manifest: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/smoke/s3/contact_sheet/contact_sheet.manifest.json")
              for label, directory in smoke_dirs:
                  path = root / "smoke" / "s3" / "visuals" / directory / "png"
                  if path.exists():
                      lines.append(f"- {label}: https://github.com/{repo}/tree/{branch}/{preview_dir}/smoke/s3/visuals/{directory}/png")
          lines += ["", "Review only: this does not publish, schedule, or approve Instagram content.", ""]
          readme_path.write_text("\n".join(lines), encoding="utf-8")
          PY

          git -C /tmp/instagram-visual-preview-worktree add "${PREVIEW_DIR}"
          git -C /tmp/instagram-visual-preview-worktree commit -m "Update Instagram visual preview output for run ${GITHUB_RUN_ID}" || true
          git -C /tmp/instagram-visual-preview-worktree push origin "${PREVIEW_BRANCH}"

          {
            echo "## Instagram visual contact sheets"
            echo
            for visual_id in ${VISUAL_IDS}; do
              echo "- [Open ${visual_id} contact sheet](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PREVIEW_DIR}/tests/${visual_id}/contact_sheet.png)"
            done
            echo
            echo "## S3 smoke preview"
            echo
            echo "- Status: \`${S3_SMOKE_STATUS}\`"
            echo "- Status JSON: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/status/s3_smoke_status.json"
            if [[ -f "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data/s3_mapping_readiness.md" ]]; then
              echo "- Mapping readiness summary: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/generated_visual_data/s3_mapping_readiness.md"
            fi
            if [[ -f "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data/s3_mapping_readiness.json" ]]; then
              echo "- Mapping readiness JSON: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/generated_visual_data/s3_mapping_readiness.json"
            fi
            if [[ -f "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data/s3_schema_profile.md" ]]; then
              echo "- Schema profile summary: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/generated_visual_data/s3_schema_profile.md"
            fi
            if [[ -f "/tmp/instagram-visual-preview-worktree/${S3_SMOKE_DIR}/generated_visual_data/s3_schema_profile.json" ]]; then
              echo "- Schema profile JSON: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/generated_visual_data/s3_schema_profile.json"
            fi
            if [[ "${S3_SMOKE_STATUS}" == "succeeded" ]]; then
              echo "- Smoke contact sheet: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/contact_sheet/contact_sheet.png"
              echo "- Smoke contact sheet manifest: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/contact_sheet/contact_sheet.manifest.json"
              echo "- Debate issue horizontal bar PNGs: https://github.com/${GITHUB_REPOSITORY}/tree/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/visuals/debate_issues_horizontal_bar/png"
              echo "- Debate issue vertical bar PNGs: https://github.com/${GITHUB_REPOSITORY}/tree/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/visuals/debate_issues_vertical_bar/png"
              echo "- Member party donut PNGs: https://github.com/${GITHUB_REPOSITORY}/tree/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/visuals/member_parties_donut_chart/png"
              echo "- Member party horizontal bar PNGs: https://github.com/${GITHUB_REPOSITORY}/tree/${PREVIEW_BRANCH}/${S3_SMOKE_DIR}/visuals/member_parties_horizontal_bar/png"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload generated media tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-media-test-output
          path: |
            generated_media_tests/
            generated_visual_data/
            generated_visuals/
            generated_visual_tests/
            workflow_debug/
          if-no-files-found: warn
