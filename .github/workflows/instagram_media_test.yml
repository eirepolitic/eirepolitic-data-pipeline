name: Instagram Media Generator Test (Manual)

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to test"
        required: false
        default: "horizontal_bar_chart"
      test_case:
        description: "Specific test case or all"
        required: false
        default: "all"

concurrency:
  group: instagram-media-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  media_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run media generator fake-data cases
        shell: bash
        run: |
          set -o pipefail
          GENERATOR="${{ inputs.generator }}"
          TEST_CASE="${{ inputs.test_case }}"
          GENERATOR="${GENERATOR:-horizontal_bar_chart}"
          TEST_CASE="${TEST_CASE:-all}"
          mkdir -p workflow_debug
          {
            echo "generator=${GENERATOR}"
            echo "test_case=${TEST_CASE}"
            python --version
            python process/instagram_generate_media.py \
              --spec "instagram/media_generators/${GENERATOR}/fake_data_cases.yml" \
              --test-case "${TEST_CASE}"
          } 2>&1 | tee workflow_debug/media_test.log

      - name: Upload generated media tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-media-test-output
          path: |
            generated_media_tests/
            workflow_debug/
          if-no-files-found: warn
