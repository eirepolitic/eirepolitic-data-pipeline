name: Instagram Media Generator Test (Manual)

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to test, or all"
        required: false
        default: "all"
      test_case:
        description: "Specific test case or all"
        required: false
        default: "all"

concurrency:
  group: instagram-media-test
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  media_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run media generator fake-data cases
        shell: bash
        run: |
          set -o pipefail
          GENERATOR="${{ inputs.generator }}"
          TEST_CASE="${{ inputs.test_case }}"
          GENERATOR="${GENERATOR:-all}"
          TEST_CASE="${TEST_CASE:-all}"
          mkdir -p workflow_debug
          {
            echo "generator=${GENERATOR}"
            echo "test_case=${TEST_CASE}"
            python --version
            python process/instagram_generate_media.py \
              --generator "${GENERATOR}" \
              --test-case "${TEST_CASE}"
          } 2>&1 | tee workflow_debug/media_test.log

      - name: Render draft visual sample
        shell: bash
        run: |
          set -o pipefail
          SAMPLE_PATH="instagram/visuals/samples/horizontal_bar_draft_v1.sample.yml"
          OUTPUT_ROOT="generated_visuals"
          mkdir -p workflow_debug
          {
            echo "sample_path=${SAMPLE_PATH}"
            echo "output_root=${OUTPUT_ROOT}"
            python process/instagram_render_visual.py \
              --sample "${SAMPLE_PATH}" \
              --output-root "${OUTPUT_ROOT}"
          } 2>&1 | tee workflow_debug/visual_preview.log

      - name: Publish visual preview branch
        shell: bash
        run: |
          set -euo pipefail
          PREVIEW_BRANCH="instagram-preview-output"
          PREVIEW_DIR="preview/visuals"

          rm -rf /tmp/instagram-visual-preview-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PREVIEW_BRANCH}:${PREVIEW_BRANCH}"
            git worktree add /tmp/instagram-visual-preview-worktree "${PREVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/instagram-visual-preview-worktree HEAD
            git -C /tmp/instagram-visual-preview-worktree switch --orphan "${PREVIEW_BRANCH}"
            git -C /tmp/instagram-visual-preview-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}"
          rm -rf "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR:?}/"*
          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/png"
          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/metadata"
          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/manifests"
          cp -R generated_visuals/png/. "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/png/"
          cp -R generated_visuals/metadata/. "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/metadata/"
          cp -R generated_visuals/manifests/. "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/manifests/"

          python - "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/README.md" "${GITHUB_REPOSITORY}" "${PREVIEW_BRANCH}" "${PREVIEW_DIR}" <<'PY'
          import sys
          from pathlib import Path

          readme_path = Path(sys.argv[1])
          repo = sys.argv[2]
          branch = sys.argv[3]
          preview_dir = sys.argv[4]
          png_dir = readme_path.parent / "png"
          pngs = sorted(p.name for p in png_dir.glob("*.png"))
          lines = [
              "# Instagram visual preview output",
              "",
              "This folder is machine-updated by the review-only Instagram Media Generator Test workflow.",
              "",
              "Latest PNG previews:",
          ]
          if pngs:
              for name in pngs:
                  lines.append(f"https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/png/{name}")
          else:
              lines.append("No PNG previews found.")
          lines += [
              "",
              "Review only: this does not publish, schedule, or approve Instagram content.",
              "",
          ]
          readme_path.write_text("\n".join(lines), encoding="utf-8")
          PY

          git -C /tmp/instagram-visual-preview-worktree add "${PREVIEW_DIR}"
          git -C /tmp/instagram-visual-preview-worktree commit -m "Update Instagram visual preview output for run ${GITHUB_RUN_ID}" || true
          git -C /tmp/instagram-visual-preview-worktree push origin "${PREVIEW_BRANCH}"

          {
            echo "## Instagram visual preview links"
            echo
            find generated_visuals/png -maxdepth 1 -type f -name '*.png' -printf '%f\n' | sort | while read -r png_name; do
              echo "- [Open ${png_name}](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PREVIEW_DIR}/png/${png_name})"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload generated media tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-media-test-output
          path: |
            generated_media_tests/
            generated_visuals/
            workflow_debug/
          if-no-files-found: warn
