name: Instagram Media Generator Test (Manual)

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to test, or all"
        required: false
        default: "all"
      test_case:
        description: "Specific test case or all"
        required: false
        default: "all"

concurrency:
  group: instagram-media-test
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  media_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run media generator fake-data cases
        shell: bash
        run: |
          set -o pipefail
          GENERATOR="${{ inputs.generator }}"
          TEST_CASE="${{ inputs.test_case }}"
          GENERATOR="${GENERATOR:-all}"
          TEST_CASE="${TEST_CASE:-all}"
          mkdir -p workflow_debug
          {
            echo "generator=${GENERATOR}"
            echo "test_case=${TEST_CASE}"
            python --version
            python process/instagram_generate_media.py \
              --generator "${GENERATOR}" \
              --test-case "${TEST_CASE}"
          } 2>&1 | tee workflow_debug/media_test.log

      - name: Render draft visual samples
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug
          {
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/horizontal_bar_draft_v1.sample.yml" --output-root "generated_visuals/horizontal_bar_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/vertical_bar_draft_v1.sample.yml" --output-root "generated_visuals/vertical_bar_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/line_chart_draft_v1.sample.yml" --output-root "generated_visuals/line_chart_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/stacked_bar_draft_v1.sample.yml" --output-root "generated_visuals/stacked_bar_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/ranking_table_draft_v1.sample.yml" --output-root "generated_visuals/ranking_table_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/choropleth_map_draft_v1.sample.yml" --output-root "generated_visuals/choropleth_map_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/point_map_draft_v1.sample.yml" --output-root "generated_visuals/point_map_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/table_card_draft_v1.sample.yml" --output-root "generated_visuals/table_card_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/small_multiples_draft_v1.sample.yml" --output-root "generated_visuals/small_multiples_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/area_chart_draft_v1.sample.yml" --output-root "generated_visuals/area_chart_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/scatter_plot_draft_v1.sample.yml" --output-root "generated_visuals/scatter_plot_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/dot_plot_draft_v1.sample.yml" --output-root "generated_visuals/dot_plot_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/lollipop_chart_draft_v1.sample.yml" --output-root "generated_visuals/lollipop_chart_draft_v1"
            python process/instagram_render_visual.py --sample "instagram/visuals/samples/slope_chart_draft_v1.sample.yml" --output-root "generated_visuals/slope_chart_draft_v1"
          } 2>&1 | tee workflow_debug/visual_preview.log

      - name: Render visual variation test packs
        shell: bash
        run: |
          set -o pipefail
          mkdir -p workflow_debug
          {
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/horizontal_bar_draft_v1/cases.yml" --output-root "generated_visual_tests/horizontal_bar_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/vertical_bar_draft_v1/cases.yml" --output-root "generated_visual_tests/vertical_bar_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/line_chart_draft_v1/cases.yml" --output-root "generated_visual_tests/line_chart_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/stacked_bar_draft_v1/cases.yml" --output-root "generated_visual_tests/stacked_bar_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/ranking_table_draft_v1/cases.yml" --output-root "generated_visual_tests/ranking_table_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/choropleth_map_draft_v1/cases.yml" --output-root "generated_visual_tests/choropleth_map_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/point_map_draft_v1/cases.yml" --output-root "generated_visual_tests/point_map_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/table_card_draft_v1/cases.yml" --output-root "generated_visual_tests/table_card_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/small_multiples_draft_v1/cases.yml" --output-root "generated_visual_tests/small_multiples_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/area_chart_draft_v1/cases.yml" --output-root "generated_visual_tests/area_chart_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/scatter_plot_draft_v1/cases.yml" --output-root "generated_visual_tests/scatter_plot_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/dot_plot_draft_v1/cases.yml" --output-root "generated_visual_tests/dot_plot_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/lollipop_chart_draft_v1/cases.yml" --output-root "generated_visual_tests/lollipop_chart_draft_v1"
            python process/instagram_render_visual_test_pack.py --registry "instagram/visuals/tests/slope_chart_draft_v1/cases.yml" --output-root "generated_visual_tests/slope_chart_draft_v1"
          } 2>&1 | tee workflow_debug/visual_test_pack.log

      - name: Publish visual preview branch
        shell: bash
        run: |
          set -euo pipefail
          PREVIEW_BRANCH="instagram-preview-output"
          PREVIEW_DIR="preview/visuals"
          VISUAL_IDS="horizontal_bar_draft_v1 vertical_bar_draft_v1 line_chart_draft_v1 stacked_bar_draft_v1 ranking_table_draft_v1 choropleth_map_draft_v1 point_map_draft_v1 table_card_draft_v1 small_multiples_draft_v1 area_chart_draft_v1 scatter_plot_draft_v1 dot_plot_draft_v1 lollipop_chart_draft_v1 slope_chart_draft_v1"

          rm -rf /tmp/instagram-visual-preview-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${PREVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${PREVIEW_BRANCH}:${PREVIEW_BRANCH}"
            git worktree add /tmp/instagram-visual-preview-worktree "${PREVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/instagram-visual-preview-worktree HEAD
            git -C /tmp/instagram-visual-preview-worktree switch --orphan "${PREVIEW_BRANCH}"
            git -C /tmp/instagram-visual-preview-worktree rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}"
          rm -rf "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR:?}/"*

          for visual_id in ${VISUAL_IDS}; do
            SAMPLE_DIR="/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/samples/${visual_id}"
            TEST_DIR="/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/tests/${visual_id}"
            mkdir -p "${SAMPLE_DIR}/png" "${SAMPLE_DIR}/metadata" "${SAMPLE_DIR}/manifests"
            mkdir -p "${TEST_DIR}/png" "${TEST_DIR}/metadata" "${TEST_DIR}/manifests"
            cp -R "generated_visuals/${visual_id}/png/." "${SAMPLE_DIR}/png/"
            cp -R "generated_visuals/${visual_id}/metadata/." "${SAMPLE_DIR}/metadata/"
            cp -R "generated_visuals/${visual_id}/manifests/." "${SAMPLE_DIR}/manifests/"
            cp -R "generated_visual_tests/${visual_id}/png/." "${TEST_DIR}/png/"
            cp -R "generated_visual_tests/${visual_id}/metadata/." "${TEST_DIR}/metadata/"
            cp -R "generated_visual_tests/${visual_id}/manifests/." "${TEST_DIR}/manifests/"
            cp "generated_visual_tests/${visual_id}/contact_sheet.png" "${TEST_DIR}/contact_sheet.png"
            cp "generated_visual_tests/${visual_id}/test_pack_manifest.json" "${TEST_DIR}/test_pack_manifest.json"
          done

          python - "/tmp/instagram-visual-preview-worktree/${PREVIEW_DIR}/README.md" "${GITHUB_REPOSITORY}" "${PREVIEW_BRANCH}" "${PREVIEW_DIR}" <<'PY'
          import sys
          from pathlib import Path

          readme_path = Path(sys.argv[1])
          repo = sys.argv[2]
          branch = sys.argv[3]
          preview_dir = sys.argv[4]
          root = readme_path.parent
          visual_ids = [
              "horizontal_bar_draft_v1",
              "vertical_bar_draft_v1",
              "line_chart_draft_v1",
              "stacked_bar_draft_v1",
              "ranking_table_draft_v1",
              "choropleth_map_draft_v1",
              "point_map_draft_v1",
              "table_card_draft_v1",
              "small_multiples_draft_v1",
              "area_chart_draft_v1",
              "scatter_plot_draft_v1",
              "dot_plot_draft_v1",
              "lollipop_chart_draft_v1",
              "slope_chart_draft_v1",
          ]
          lines = [
              "# Instagram visual preview output",
              "",
              "This folder is machine-updated by the review-only Instagram Media Generator Test workflow.",
              "",
              "Contact sheets:",
          ]
          for visual_id in visual_ids:
              lines.append(f"- {visual_id}: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/tests/{visual_id}/contact_sheet.png")
          lines += ["", "Sample PNGs:"]
          for visual_id in visual_ids:
              png_dir = root / "samples" / visual_id / "png"
              for png in sorted(png_dir.glob("*.png")):
                  lines.append(f"- {visual_id}/{png.name}: https://raw.githubusercontent.com/{repo}/{branch}/{preview_dir}/samples/{visual_id}/png/{png.name}")
          lines += ["", "Review only: this does not publish, schedule, or approve Instagram content.", ""]
          readme_path.write_text("\n".join(lines), encoding="utf-8")
          PY

          git -C /tmp/instagram-visual-preview-worktree add "${PREVIEW_DIR}"
          git -C /tmp/instagram-visual-preview-worktree commit -m "Update Instagram visual preview output for run ${GITHUB_RUN_ID}" || true
          git -C /tmp/instagram-visual-preview-worktree push origin "${PREVIEW_BRANCH}"

          {
            echo "## Instagram visual contact sheets"
            echo
            for visual_id in ${VISUAL_IDS}; do
              echo "- [Open ${visual_id} contact sheet](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${PREVIEW_BRANCH}/${PREVIEW_DIR}/tests/${visual_id}/contact_sheet.png)"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload generated media tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instagram-media-test-output
          path: |
            generated_media_tests/
            generated_visuals/
            generated_visual_tests/
            workflow_debug/
          if-no-files-found: warn
