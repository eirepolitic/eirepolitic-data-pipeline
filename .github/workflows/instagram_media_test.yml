name: Instagram Media Generator Test (Manual)

on:
  workflow_dispatch:
    inputs:
      generator:
        description: "Generator to test"
        required: true
        default: "horizontal_bar_chart"
      test_case:
        description: "Specific test case or all"
        required: true
        default: "all"

concurrency:
  group: instagram-media-test
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  media_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run media generator fake-data cases
        run: |
          python process/instagram_generate_media.py \
            --spec "instagram/media_generators/${{ inputs.generator }}/fake_data_cases.yml" \
            --test-case "${{ inputs.test_case }}"

      - name: Upload generated media tests
        uses: actions/upload-artifact@v4
        with:
          name: instagram-media-test-output
          path: generated_media_tests/
