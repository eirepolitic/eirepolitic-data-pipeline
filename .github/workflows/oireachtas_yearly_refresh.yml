name: Oireachtas Yearly Refresh

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Build mode
        required: true
        default: test
        type: choice
        options: [test, full, backfill]
      publish_candidate:
        description: Write immutable candidate batch objects
        required: true
        default: false
        type: boolean
      tables:
        description: Optional comma-separated table list
        required: false
        default: ""
        type: string
      chamber:
        required: false
        default: dail
        type: string
      house_no:
        required: false
        default: "34"
        type: string
      date_start:
        description: Optional YYYY-MM-DD; defaults to previous calendar year
        required: false
        default: ""
        type: string
      date_end:
        description: Optional YYYY-MM-DD
        required: false
        default: ""
        type: string
      page_size:
        required: false
        default: "200"
        type: string
      sample_rows:
        required: false
        default: "10"
        type: string

permissions:
  contents: read

jobs:
  refresh:
    uses: ./.github/workflows/oireachtas_refresh_reusable.yml
    with:
      refresh_type: yearly
      mode: ${{ inputs.mode }}
      tables: ${{ inputs.tables }}
      chamber: ${{ inputs.chamber }}
      house_no: ${{ inputs.house_no }}
      date_start: ${{ inputs.date_start }}
      date_end: ${{ inputs.date_end }}
      page_size: ${{ inputs.page_size }}
      sample_rows: ${{ inputs.sample_rows }}
      batch_id: manual-yearly-${{ github.run_id }}-${{ github.run_attempt }}
      publish_candidate: ${{ inputs.publish_candidate }}
    secrets: inherit
