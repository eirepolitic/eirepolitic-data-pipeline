name: Oireachtas Batch 4 live candidate validation

on:
  workflow_dispatch:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch4_live_candidate.yml

permissions:
  contents: write

concurrency:
  group: oireachtas-batch4-live-candidate
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'true'
      OIREACHTAS_PUBLISH_LATEST: 'true'
      OIREACHTAS_BATCH_ID: batch4-validation-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture production pointer before candidate build
        id: before
        shell: bash
        run: |
          set +e
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_batch_control.py --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status \
            > pointer-before.json 2> pointer-before.err
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0
      - name: Persist early diagnostic
        if: steps.before.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Oireachtas Batch 4 live candidate diagnostic'
            echo
            echo "- Run ID: ${GITHUB_RUN_ID}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Pointer status exit code: ${{ steps.before.outputs.status }}"
            echo
            echo '```text'
            tail -n 120 pointer-before.err
            echo '```'
          } > docs/oireachtas_batch4_live_candidate_diagnostic.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_batch4_live_candidate_diagnostic.md
          git commit -m "Record Oireachtas Batch 4 live diagnostic ${GITHUB_RUN_ID}"
          git push origin HEAD:repair/oireachtas-production-hardening
          exit 1
      - name: Build complete member candidate
        shell: bash
        run: |
          set -euo pipefail
          python -m extract.oireachtas.build_table \
            --table silver_members \
            --mode full \
            --chamber dail \
            --house-no 34 \
            --limit 100 \
            --sample-rows 10 \
            --write-review-sample \
            --publish-latest true \
            --batch-id "${OIREACHTAS_BATCH_ID}" \
            --s3-bucket "${S3_BUCKET}" \
            --aws-region "${AWS_REGION}" \
            --review-root artifacts/oireachtas-batch4-live \
            | tee candidate-build.log
          rows="$(grep '^ROWS=' candidate-build.log | tail -n1 | cut -d= -f2)"
          test -n "${rows}"
          test "${rows}" -gt 100
      - name: Assemble and validate candidate manifest
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_batch_control.py \
              --bucket "${S3_BUCKET}" \
              --region "${AWS_REGION}" \
              assemble \
              --batch-id "${OIREACHTAS_BATCH_ID}" \
              --required-table silver_members \
              | tee batch-manifest.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('batch-manifest.json').read_text())
          assert payload['status'] == 'validated', payload
          assert payload['table_count'] == 1, payload
          assert payload['validation']['missing_tables'] == [], payload
          PY
      - name: Verify production pointer was unchanged
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_batch_control.py --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status \
            > pointer-after.json
          cmp pointer-before.json pointer-after.json
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-batch4-live-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            candidate-build.log
            batch-manifest.json
            pointer-before.json
            pointer-before.err
            pointer-after.json
            artifacts/oireachtas-batch4-live/**
            docs/oireachtas_batch4_live_candidate_diagnostic.md
          if-no-files-found: warn
          retention-days: 90
