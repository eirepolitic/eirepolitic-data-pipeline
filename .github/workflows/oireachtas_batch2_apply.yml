name: Oireachtas Batch 2 source patch

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oireachtas-batch2-source-patch
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply deterministic source edits
        shell: bash
        run: |
          set -euo pipefail
          python process/apply_oireachtas_batch2_patch.py
      - name: Commit source edits
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No source changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extract/oireachtas
          git commit -m 'Remove production output caps from Oireachtas builders'
          git push origin HEAD:repair/oireachtas-production-hardening
