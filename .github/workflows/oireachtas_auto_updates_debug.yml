name: Oireachtas automatic update diagnostics

on:
  push:
    branches:
      - fix/oireachtas-automatic-updates
    paths:
      - tests/test_oireachtas_*.py
      - process/oireachtas_*.py
      - .github/workflows/oireachtas_*.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/oireachtas-automatic-updates
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run full Oireachtas suite and record output
        shell: bash
        run: |
          set +e
          python -m unittest discover -s tests -p 'test_oireachtas_*.py' -v > automatic-update-test.log 2>&1
          status=$?
          cat automatic-update-test.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          mkdir -p docs/oireachtas_validation/automatic_updates
          cp automatic-update-test.log docs/oireachtas_validation/automatic_updates/test.log
          git add docs/oireachtas_validation/automatic_updates/test.log
          if ! git diff --cached --quiet; then
            git commit -m 'Record automatic update test diagnostics'
            git push origin HEAD:fix/oireachtas-automatic-updates
          fi
          exit "${status}"
