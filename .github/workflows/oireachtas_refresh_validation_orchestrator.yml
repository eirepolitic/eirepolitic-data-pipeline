name: Oireachtas Refresh Validation Orchestrator

on:
  workflow_dispatch:
    inputs:
      refresh_type:
        description: Optional refresh before validation
        required: true
        default: none
        type: choice
        options: [none, weekly, monthly, yearly]
      publish_candidate:
        description: Write an immutable candidate batch
        required: true
        default: false
        type: boolean
      run_consumers:
        description: Reserved for downstream consumer validation
        required: true
        default: false
        type: boolean
  schedule:
    - cron: '45 6 * * 0'

permissions:
  contents: read

concurrency:
  group: oireachtas-production-orchestrator
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      refresh_type: ${{ steps.values.outputs.refresh_type }}
      publish_candidate: ${{ steps.values.outputs.publish_candidate }}
      run_consumers: ${{ steps.values.outputs.run_consumers }}
      batch_id: ${{ steps.values.outputs.batch_id }}
    steps:
      - name: Resolve orchestration inputs
        id: values
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_REFRESH_TYPE: ${{ inputs.refresh_type }}
          INPUT_PUBLISH_CANDIDATE: ${{ inputs.publish_candidate }}
          INPUT_RUN_CONSUMERS: ${{ inputs.run_consumers }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == 'schedule' ]]; then
            refresh_type='weekly'
            publish_candidate='false'
            run_consumers='false'
          else
            refresh_type="${INPUT_REFRESH_TYPE:-none}"
            publish_candidate="${INPUT_PUBLISH_CANDIDATE:-false}"
            run_consumers="${INPUT_RUN_CONSUMERS:-false}"
          fi
          case "${refresh_type}" in none|weekly|monthly|yearly) ;; *) echo 'Invalid refresh type' >&2; exit 2 ;; esac
          batch_id="orchestrator-${refresh_type}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "refresh_type=${refresh_type}" >> "${GITHUB_OUTPUT}"
          echo "publish_candidate=${publish_candidate}" >> "${GITHUB_OUTPUT}"
          echo "run_consumers=${run_consumers}" >> "${GITHUB_OUTPUT}"
          echo "batch_id=${batch_id}" >> "${GITHUB_OUTPUT}"
          {
            echo '## Oireachtas orchestration plan'
            echo
            echo "- Refresh type: `${refresh_type}`"
            echo "- Batch ID: `${batch_id}`"
            echo "- Candidate publishing: `${publish_candidate}`"
            echo "- Consumer validation requested: `${run_consumers}`"
          } >> "${GITHUB_STEP_SUMMARY}"

  refresh:
    needs: prepare
    if: needs.prepare.outputs.refresh_type != 'none'
    uses: ./.github/workflows/oireachtas_refresh_reusable.yml
    with:
      refresh_type: ${{ needs.prepare.outputs.refresh_type }}
      mode: ""
      tables: ""
      chamber: dail
      house_no: "34"
      date_start: ""
      date_end: ""
      page_size: ""
      sample_rows: "10"
      batch_id: ${{ needs.prepare.outputs.batch_id }}
      publish_candidate: ${{ needs.prepare.outputs.publish_candidate == 'true' }}
    secrets: inherit

  validation:
    needs: [prepare, refresh]
    if: always() && needs.prepare.result == 'success' && (needs.refresh.result == 'success' || needs.refresh.result == 'skipped')
    uses: ./.github/workflows/oireachtas_validation_reusable.yml
    with:
      batch_id: ${{ needs.prepare.outputs.batch_id }}
      run_consumers: ${{ needs.prepare.outputs.run_consumers == 'true' }}
    secrets: inherit

  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [prepare, refresh, validation]
    if: always()
    steps:
      - name: Write orchestration result
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## Oireachtas orchestration result'
            echo
            echo "- Batch ID: `${{ needs.prepare.outputs.batch_id || 'unavailable' }}`"
            echo "- Prepare: `${{ needs.prepare.result }}`"
            echo "- Refresh: `${{ needs.refresh.result }}`"
            echo "- Validation: `${{ needs.validation.result }}`"
          } >> "${GITHUB_STEP_SUMMARY}"
          if [[ '${{ needs.prepare.result }}' != 'success' ]]; then exit 1; fi
          if [[ '${{ needs.refresh.result }}' != 'success' && '${{ needs.refresh.result }}' != 'skipped' ]]; then exit 1; fi
          if [[ '${{ needs.validation.result }}' != 'success' ]]; then exit 1; fi
