name: Oireachtas Batch 6 live candidate validation

on:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch6_live_candidate.yml

permissions:
  contents: read

concurrency:
  group: oireachtas-batch6-live-candidate
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      batch_id: ${{ steps.values.outputs.batch_id }}
      pointer_hash: ${{ steps.pointer.outputs.pointer_hash }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Set candidate identity
        id: values
        shell: bash
        run: |
          set -euo pipefail
          echo "batch_id=batch6-validation-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "${GITHUB_OUTPUT}"
      - name: Hash production pointer before candidate
        id: pointer
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_batch_control.py --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status > pointer-before.json
          hash="$(sha256sum pointer-before.json | cut -d' ' -f1)"
          echo "pointer_hash=${hash}" >> "${GITHUB_OUTPUT}"

  refresh:
    needs: prepare
    uses: ./.github/workflows/oireachtas_refresh_reusable.yml
    with:
      refresh_type: weekly
      mode: incremental
      tables: ""
      chamber: dail
      house_no: "34"
      date_start: ""
      date_end: ""
      page_size: "100"
      sample_rows: "10"
      batch_id: ${{ needs.prepare.outputs.batch_id }}
      publish_candidate: true
    secrets: inherit

  validation:
    needs: [prepare, refresh]
    uses: ./.github/workflows/oireachtas_validation_reusable.yml
    with:
      batch_id: ${{ needs.prepare.outputs.batch_id }}
      run_consumers: true
    secrets: inherit

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare, refresh, validation]
    if: always()
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      EXPECTED_POINTER_HASH: ${{ needs.prepare.outputs.pointer_hash }}
      BATCH_ID: ${{ needs.prepare.outputs.batch_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Verify production pointer unchanged
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_ENABLED=false OIREACHTAS_PUBLISH_LATEST=false \
            python process/oireachtas_batch_control.py --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status > pointer-after.json
          actual="$(sha256sum pointer-after.json | cut -d' ' -f1)"
          test "${actual}" = "${EXPECTED_POINTER_HASH}"
      - name: Write result summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## Batch 6 candidate validation'
            echo
            echo "- Batch ID: `${BATCH_ID}`"
            echo "- Refresh: `${{ needs.refresh.result }}`"
            echo "- Validation: `${{ needs.validation.result }}`"
            echo '- Production pointer unchanged: `true`'
          } >> "${GITHUB_STEP_SUMMARY}"
          test '${{ needs.refresh.result }}' = 'success'
          test '${{ needs.validation.result }}' = 'success'
      - name: Upload pointer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-batch6-pointer-${{ github.run_id }}-${{ github.run_attempt }}
          path: pointer-after.json
          if-no-files-found: warn
          retention-days: 90
