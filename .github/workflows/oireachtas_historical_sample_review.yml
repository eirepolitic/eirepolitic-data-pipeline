name: Oireachtas historical CSV sample review

on:
  push:
    branches:
      - review/oireachtas-historical-samples
    paths:
      - .github/workflows/oireachtas_historical_sample_review.yml

permissions:
  contents: write

jobs:
  sample:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: review/oireachtas-historical-samples
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Pull representative live CSV samples
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import io
          import json
          from pathlib import Path

          import boto3
          import pandas as pd

          from extract.oireachtas.io_s3 import resolve_read_key

          bucket = 'eirepolitic-data'
          region = 'ca-central-1'
          s3 = boto3.client('s3', region_name=region)

          datasets = [
              ('Members', 'processed/oireachtas_unified/latest/csv/silver_members.csv', 6),
              ('Speeches', 'processed/oireachtas_unified/latest/csv/silver_speeches.csv', 6),
              ('Member votes', 'processed/oireachtas_unified/latest/csv/silver_member_votes.csv', 6),
              ('Questions', 'processed/oireachtas_unified/latest/csv/silver_questions.csv', 6),
              ('Divisions', 'processed/oireachtas_unified/latest/csv/silver_divisions.csv', 6),
              ('Debate records', 'processed/oireachtas_unified/latest/csv/silver_debate_records.csv', 6),
          ]

          sections = ['# Oireachtas historical CSV samples', '']
          metadata = []
          for label, logical_key, count in datasets:
              try:
                  resolved = resolve_read_key(s3, bucket=bucket, key=logical_key)
                  obj = s3.get_object(Bucket=bucket, Key=resolved)
                  df = pd.read_csv(io.BytesIO(obj['Body'].read()), dtype=str, keep_default_na=False)
                  indexes = [] if df.empty else sorted(set(round(i * (len(df) - 1) / max(count - 1, 1)) for i in range(min(count, len(df)))))
                  sample = df.iloc[indexes].copy() if indexes else df
                  metadata.append({'label': label, 'logical_key': logical_key, 'resolved_key': resolved, 'rows': len(df), 'columns': list(df.columns)})
                  sections.extend([
                      f'## {label}',
                      '',
                      f'- Total rows: `{len(df)}`',
                      f'- Columns: `{len(df.columns)}`',
                      f'- Logical output: `{logical_key}`',
                      '',
                      '```csv',
                      sample.to_csv(index=False).rstrip(),
                      '```',
                      '',
                  ])
              except Exception as exc:
                  metadata.append({'label': label, 'logical_key': logical_key, 'error': f'{type(exc).__name__}: {exc}'})
                  sections.extend([f'## {label}', '', f'Could not load: `{type(exc).__name__}: {exc}`', ''])

          Path('docs/oireachtas_historical_csv_samples.md').write_text('\n'.join(sections), encoding='utf-8')
          Path('docs/oireachtas_historical_csv_samples_metadata.json').write_text(json.dumps(metadata, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          PY
      - name: Commit review samples
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/oireachtas_historical_csv_samples.md docs/oireachtas_historical_csv_samples_metadata.json
          git commit -m "Refresh read-only Oireachtas historical CSV samples"
          git push origin HEAD:review/oireachtas-historical-samples
