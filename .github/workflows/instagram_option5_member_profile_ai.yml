name: Generate Instagram Option 5 Member Profile AI Edit Test (Manual)

on:
  workflow_dispatch:
    inputs:
      date_start:
        description: "Vote API start date"
        required: true
        default: "2025-01-01"
      date_end:
        description: "Vote API end date"
        required: true
        default: "2025-12-31"
      model:
        description: "OpenAI image model"
        required: true
        default: "gpt-image-1"
      spec_path:
        description: "YAML spec path"
        required: true
        default: "instagram/specs/member_profile_ai_test.yml"

concurrency:
  group: instagram-option5-member-profile-ai-edit
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  member_profile_ai_edit:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      S3_BUCKET: "eirepolitic-data"
      VOTES_DATE_START: ${{ inputs.date_start }}
      VOTES_DATE_END: ${{ inputs.date_end }}
      TARGET_YEAR: "2025"
      OPENAI_IMAGE_MODEL: ${{ inputs.model }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Dail vote member records
        run: |
          python process/build_dail_votes_member_records.py \
            --date-start "${{ inputs.date_start }}" \
            --date-end "${{ inputs.date_end }}"

      - name: Build member profile metrics 2025
        run: |
          python process/build_member_profile_metrics_2025.py

      - name: Run member profile AI edit test
        run: |
          python process/render_member_profile_ai_edit.py \
            --spec "${{ inputs.spec_path }}" \
            --model "${{ inputs.model }}"

      - name: Upload option 5 member profile artifact
        uses: actions/upload-artifact@v4
        with:
          name: instagram-option5-member-profile-ai-edit
          path: generated_visual_tests/option5_member_profile_ai/
          if-no-files-found: error
