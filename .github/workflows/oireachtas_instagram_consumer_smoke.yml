name: Oireachtas Instagram Consumer Smoke Test (Manual)

on:
  workflow_dispatch:
    inputs:
      constituency:
        description: "Constituency name from current compat roster"
        required: true
        default: "Wicklow-Wexford"
      member_name:
        description: "Optional TD full name override"
        required: false
        default: "Brian Brennan"
      spec_path:
        description: "YAML spec path"
        required: true
        default: "instagram/specs/constituency_test_post.yml"
      skip_screenshots:
        description: "Skip PNG screenshots and render HTML/context only"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: oireachtas-instagram-consumer-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke_test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ca-central-1"
      S3_BUCKET: "eirepolitic-data"
      INSTAGRAM_MEMBERS_DATASET_KEYS: "processed/oireachtas_unified/compat/members/oireachtas_members_34th_dail_compat.csv"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Render Instagram smoke test using compat members
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --spec "${{ inputs.spec_path }}"
            --constituency "${{ inputs.constituency }}"
            --member-name "${{ inputs.member_name }}"
            --output-dir "generated_posts_oireachtas_compat_trial"
          )
          if [[ "${{ inputs.skip_screenshots }}" == "true" ]]; then
            args+=(--skip-screenshots)
          fi
          python process/instagram_render_post.py "${args[@]}" | tee oireachtas_instagram_consumer_smoke.log

      - name: Validate smoke output
        shell: bash
        run: |
          set -euo pipefail
          context_file="$(find generated_posts_oireachtas_compat_trial -name post_context.json | head -n 1)"
          if [[ -z "${context_file}" ]]; then
            echo "No post_context.json found."
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          context_path = Path(next(Path('generated_posts_oireachtas_compat_trial').rglob('post_context.json')))
          context = json.loads(context_path.read_text(encoding='utf-8'))
          datasets = context.get('datasets_used', [])
          compat_key = 'processed/oireachtas_unified/compat/members/oireachtas_members_34th_dail_compat.csv'
          if not any(compat_key in item for item in datasets):
              raise SystemExit(f'Compat members key not used. datasets_used={datasets}')
          html_count = len(list(context_path.parent.joinpath('html').glob('*.html')))
          png_dir = context_path.parent.joinpath('png')
          png_count = len(list(png_dir.glob('*.png'))) if png_dir.exists() else 0
          report = {
              'status': 'pass',
              'context_path': str(context_path),
              'constituency': context.get('constituency', {}).get('name'),
              'member': context.get('member', {}).get('full_name'),
              'datasets_used': datasets,
              'html_count': html_count,
              'png_count': png_count,
          }
          Path('oireachtas_instagram_consumer_smoke_report.json').write_text(json.dumps(report, indent=2), encoding='utf-8')
          print(json.dumps(report, indent=2))
          if html_count == 0:
              raise SystemExit('No HTML slides rendered.')
          PY

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oireachtas Instagram consumer smoke test"
            echo
            echo "- Constituency: \`${{ inputs.constituency }}\`"
            echo "- Member: \`${{ inputs.member_name }}\`"
            echo "- Compat members key: \`${INSTAGRAM_MEMBERS_DATASET_KEYS}\`"
            echo "- Production defaults changed: \`false\`"
            echo
            echo '```text'
            if [[ -f oireachtas_instagram_consumer_smoke.log ]]; then
              cat oireachtas_instagram_consumer_smoke.log
            else
              echo "No smoke log found."
            fi
            echo '```'
            if [[ -f oireachtas_instagram_consumer_smoke_report.json ]]; then
              echo
              echo '```json'
              cat oireachtas_instagram_consumer_smoke_report.json
              echo
              echo '```'
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-instagram-consumer-smoke-output
          path: |
            generated_posts_oireachtas_compat_trial/**
            oireachtas_instagram_consumer_smoke.log
            oireachtas_instagram_consumer_smoke_report.json
          if-no-files-found: error
