name: Oireachtas Member Profile Metrics Trial (Manual)

on:
  workflow_dispatch:
    inputs:
      sample_rows:
        description: "Review sample row count"
        required: false
        default: "10"
      debate_issues_input_key:
        description: "Debate issue/classified speeches input key"
        required: false
        default: "processed/oireachtas_unified/compat/debates/debate_speeches_classified_compat.csv"
      member_photos_input_key:
        description: "Member photo URL input key"
        required: false
        default: "processed/oireachtas_unified/compat/media/members_photo_urls_compat.csv"

concurrency:
  group: oireachtas-member-profile-trial
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  member_profile_trial:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ca-central-1"
      S3_BUCKET: "eirepolitic-data"
      REVIEW_OUTPUT_ROOT: "oireachtas_review_output"
      REVIEW_BRANCH: "oireachtas-review-output"
      SAMPLE_ROWS: ${{ inputs.sample_rows }}
      TARGET_YEAR: "2025"
      MEMBERS_INPUT_KEY: "processed/oireachtas_unified/compat/members/oireachtas_members_34th_dail_compat.csv"
      MEMBER_VOTES_INPUT_KEY: "processed/oireachtas_unified/compat/votes/dail_vote_member_records_compat.csv"
      DEBATE_ISSUES_INPUT_KEY: ${{ inputs.debate_issues_input_key }}
      MEMBER_PHOTOS_INPUT_KEY: ${{ inputs.member_photos_input_key }}
      MEMBER_PROFILE_METRICS_OUTPUT_CSV_KEY: "processed/oireachtas_unified/compat/members/member_profile_metrics_2025_trial.csv"
      MEMBER_PROFILE_METRICS_OUTPUT_PARQUET_KEY: "processed/oireachtas_unified/compat/members/parquets/member_profile_metrics_2025_trial.parquet"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build compatibility adapters
        run: |
          python -m extract.oireachtas.downstream_compat | tee oireachtas_compat_adapters.log

      - name: Build member profile metrics trial
        run: |
          python process/build_member_profile_metrics_2025.py | tee oireachtas_member_profile_trial_build.log

      - name: Build trial review report
        run: |
          python -m extract.oireachtas.member_profile_trial_report | tee oireachtas_member_profile_trial_report.log

      - name: Publish review output branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d "${REVIEW_OUTPUT_ROOT}" ]]; then
            echo "No review output directory found: ${REVIEW_OUTPUT_ROOT}; skipping branch publish."
            exit 0
          fi
          rm -rf /tmp/oireachtas-review-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin "${REVIEW_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${REVIEW_BRANCH}:${REVIEW_BRANCH}"
            git worktree add /tmp/oireachtas-review-worktree "${REVIEW_BRANCH}"
          else
            git worktree add --detach /tmp/oireachtas-review-worktree HEAD
            git -C /tmp/oireachtas-review-worktree switch --orphan "${REVIEW_BRANCH}"
            git -C /tmp/oireachtas-review-worktree rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p /tmp/oireachtas-review-worktree/review
          cp -R "${REVIEW_OUTPUT_ROOT}/." /tmp/oireachtas-review-worktree/
          git -C /tmp/oireachtas-review-worktree add .
          git -C /tmp/oireachtas-review-worktree commit -m "Update Oireachtas member profile trial review output for run ${GITHUB_RUN_ID}" || true
          for attempt in 1 2 3; do
            git -C /tmp/oireachtas-review-worktree pull --rebase origin "${REVIEW_BRANCH}" || true
            if git -C /tmp/oireachtas-review-worktree push origin "${REVIEW_BRANCH}"; then
              exit 0
            fi
            if [[ "${attempt}" == "3" ]]; then
              echo "Review branch push failed after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Oireachtas member profile metrics trial"
            echo
            echo "- Review branch: \`${REVIEW_BRANCH}\`"
            echo "- Debate issues input: \`${DEBATE_ISSUES_INPUT_KEY}\`"
            echo "- Member photos input: \`${MEMBER_PHOTOS_INPUT_KEY}\`"
            echo "- Manifest: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_profile_metrics_trial/latest/manifest.json"
            echo "- Sample CSV: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_profile_metrics_trial/latest/sample.csv"
            echo "- Report: https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REVIEW_BRANCH}/review/member_profile_metrics_trial/latest/report.md"
            echo
            echo '```text'
            if [[ -f oireachtas_member_profile_trial_report.log ]]; then
              cat oireachtas_member_profile_trial_report.log
            else
              echo "No trial report log found."
            fi
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload trial artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-member-profile-trial-output
          path: |
            oireachtas_review_output/**
            oireachtas_compat_adapters.log
            oireachtas_member_profile_trial_build.log
            oireachtas_member_profile_trial_report.log
          if-no-files-found: warn
