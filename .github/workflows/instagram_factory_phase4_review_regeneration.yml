name: Instagram Content Factory Phase 4 review and regeneration

on:
  workflow_dispatch:
  push:
    branches:
      - feature/instagram-content-factory-phase4-review-regeneration
    paths:
      - "instagram/factory/review.py"
      - "instagram/factory/regeneration.py"
      - "instagram/factory/constituency_batch.py"
      - "process/instagram_factory.py"
      - "tests/test_instagram_factory.py"
      - "tests/test_instagram_factory_phase4.py"
      - ".github/workflows/instagram_factory_phase4_review_regeneration.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pillow matplotlib boto3 requests
      - name: Validate catalogues and project
        run: |
          python process/instagram_factory.py validate-catalogues
          python process/instagram_factory.py validate-project --project instagram/projects/constituency_issue_profile_v1/project.yml
      - name: Run Phase 1-4 tests
        run: python -m unittest tests.test_instagram_factory tests.test_instagram_factory_phase4 -v
