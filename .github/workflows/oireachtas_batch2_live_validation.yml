name: Oireachtas Batch 2 live validation

on:
  workflow_dispatch:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_batch2_live_validation.yml

permissions:
  contents: read

concurrency:
  group: oireachtas-batch2-live-validation
  cancel-in-progress: false

jobs:
  validate-members:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Extract complete member roster without promotion
        shell: bash
        run: |
          set -euo pipefail
          python -m extract.oireachtas.build_table \
            --table silver_members \
            --mode full \
            --chamber dail \
            --house-no 34 \
            --limit 100 \
            --sample-rows 10 \
            --write-review-sample \
            --publish-latest false \
            --s3-bucket "${S3_BUCKET}" \
            --aws-region "${AWS_REGION}" \
            --review-root artifacts/oireachtas-batch2-live \
            --github-repository "${GITHUB_REPOSITORY}" \
            | tee artifacts/oireachtas-batch2-live.log
      - name: Assert extraction exceeded the former cap
        shell: bash
        run: |
          set -euo pipefail
          rows="$(grep '^ROWS=' artifacts/oireachtas-batch2-live.log | tail -n1 | cut -d= -f2)"
          test -n "${rows}"
          test "${rows}" -gt 100
          echo "Validated complete roster row count: ${rows}"
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-batch2-live-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            artifacts/oireachtas-batch2-live/**
            artifacts/oireachtas-batch2-live.log
          if-no-files-found: error
          retention-days: 30
