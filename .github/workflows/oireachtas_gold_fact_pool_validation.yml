name: Oireachtas gold fact pool dependency validation

on:
  workflow_dispatch:
  push:
    branches:
      - repair/oireachtas-production-hardening
    paths:
      - .github/workflows/oireachtas_gold_fact_pool_validation.yml

permissions:
  contents: read

concurrency:
  group: oireachtas-gold-fact-pool-validation
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ca-central-1
      AWS_REGION: ca-central-1
      S3_BUCKET: eirepolitic-data
      OIREACHTAS_BATCH_ID: gold-fact-validation-${{ github.run_id }}-${{ github.run_attempt }}
      OIREACHTAS_PUBLISH_ENABLED: 'false'
      OIREACHTAS_PUBLISH_LATEST: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: repair/oireachtas-production-hardening
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Capture production pointer
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_LATEST=false python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status > pointer-before.json
      - name: Seed required candidate inputs
        shell: bash
        run: |
          set -euo pipefail
          start="$(date -u -d '35 days ago' +%F)"
          end="$(date -u +%F)"
          for table in silver_members silver_member_memberships silver_member_parties silver_member_constituencies silver_member_offices silver_debate_records silver_debate_sections silver_speeches silver_divisions silver_division_tallies silver_member_votes gold_current_members gold_member_activity_yearly gold_member_activity_monthly; do
            python -m extract.oireachtas.build_table \
              --table "${table}" --mode incremental --publish-latest true \
              --batch-id "${OIREACHTAS_BATCH_ID}" --chamber dail --house-no 34 \
              --date-start "${start}" --date-end "${end}" --limit 100 --sample-rows 5 \
              --write-review-sample --s3-bucket "${S3_BUCKET}" --aws-region "${AWS_REGION}" \
              --review-root gold_fact_review --github-repository "${GITHUB_REPOSITORY}"
          done
      - name: Build constituency gold then content fact pool
        shell: bash
        run: |
          set -euo pipefail
          for table in gold_constituency_activity_yearly gold_content_fact_pool; do
            python -m extract.oireachtas.build_table \
              --table "${table}" --mode incremental --publish-latest true \
              --batch-id "${OIREACHTAS_BATCH_ID}" --chamber dail --house-no 34 \
              --date-start "$(date -u -d '35 days ago' +%F)" --date-end "$(date -u +%F)" \
              --limit 100 --sample-rows 10 --write-review-sample \
              --s3-bucket "${S3_BUCKET}" --aws-region "${AWS_REGION}" \
              --review-root gold_fact_review --github-repository "${GITHUB_REPOSITORY}" \
              | tee -a gold-fact-build.log
          done
      - name: Assert DQ and outputs
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path
          for table in ('gold_constituency_activity_yearly', 'gold_content_fact_pool'):
              manifests = sorted(Path('gold_fact_review', table, 'runs').glob('*/manifest.json'))
              assert len(manifests) == 1, (table, manifests)
              manifest = json.loads(manifests[0].read_text())
              assert manifest['dq_status'] == 'pass', manifest
              assert manifest['output_rows'] > 0, manifest
          PY
      - name: Verify production pointer unchanged
        shell: bash
        run: |
          set -euo pipefail
          OIREACHTAS_PUBLISH_LATEST=false python process/oireachtas_batch_control.py \
            --bucket "${S3_BUCKET}" --region "${AWS_REGION}" status > pointer-after.json
          cmp pointer-before.json pointer-after.json
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oireachtas-gold-fact-pool-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            gold-fact-build.log
            pointer-before.json
            pointer-after.json
            gold_fact_review/**
          if-no-files-found: warn
          retention-days: 90
