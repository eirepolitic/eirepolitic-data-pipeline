project_id: constituency_issue_profile_v1
version: 1
status: draft
purpose: Show the parliamentary issue profile for each constituency using classified debate speeches from its current members.

granularity:
  grain: constituency
  key_fields: [constituency]
  label_field: constituency
  source_metric: constituency_issue_counts
  selector:
    mode: all_complete
  ordering:
    field: constituency
    direction: ascending

period:
  mode: latest_available
  field: null

slides:
  - slide_id: cover
    order: 1
    post_type_id: title_text_media_v1
    text:
      slide_title: "{{ constituency }}"
      body_text: "A constituency-level view of parliamentary issues raised by its current TDs."
      footer_text: "Source: Houses of the Oireachtas and Eirepolitic issue classification"
    media:
      type: generated_constituency_card
      binding: constituency_cover
    accessibility:
      alt_text_template: "Cover slide for {{ constituency }} parliamentary issue profile."
    fallback_behavior:
      missing_optional_text: omit
      missing_media: generate_placeholder

  - slide_id: issue_profile
    order: 2
    post_type_id: title_text_media_v1
    text:
      slide_title: "Issues raised by {{ constituency }} TDs"
      body_text: "Classified debate speeches grouped by political issue. Counts describe recorded speeches, not policy positions."
      footer_text: "Source: Houses of the Oireachtas and Eirepolitic issue classification"
    visual:
      visual_type_id: horizontal_bar_draft_v1
      metric_id: constituency_issue_counts
      bindings:
        label: label
        value: value
      filters:
        constituency: "{{ constituency }}"
      grouping: {}
      sort:
        field: value
        direction: descending
      item_limit: 8
      empty_data_behavior: fail
    accessibility:
      alt_text_template: "Horizontal bar chart of classified parliamentary issues raised by TDs for {{ constituency }}."
    fallback_behavior:
      missing_optional_text: omit
      missing_visual: fail

validation:
  scenarios: [minimum, maximum, real_example]
  real_example_selector:
    mode: median_complexity
  require_explicit_approval: true

output:
  local_root: generated_factory_tests/constituency_issue_profile_v1
  s3_prefix: processed/instagram_factory/projects/constituency_issue_profile_v1
  preview_branch: instagram-preview-output

review:
  require_all_items_reviewed: true
  allow_targeted_regeneration: true

schedule:
  enabled: false
  cadence: null
  trigger: manual
