post:
  slug: constituency-test
  title: Constituency Test Carousel
  output_root: generated_posts
  slide_size:
    width: 1080
    height: 1350

style:
  theme: classic_eirepolitic
  ornament: true
  image_frame: true
  title_align: center

data:
  constituency: Wicklow-Wexford
  member_name:
  issue_limit: 8
  member_selection: highest_speech_count
  metrics:
    vote_participation_pct:
    speech_rank:
    constituency_speech_rank:
  glossary:
    issues: Political issue categories come from the Comparative Agendas Project. Speech counts come from the debate issue classifier assigning one category or NONE to each speech segment.
    vote_participation_pct: Percentage of Dáil votes in the period where a TD voted, or for a constituency the average across its TDs.
    speech_rank: Ranking by number of debate speech segments relative to peers.

slides:
  - key: overview
    type: constituency_overview
    title: Constituency Overview 2025
    enabled: true
    content:
      show_map: true
      show_top_issue: true
      show_vote_participation: true
      show_speech_rank: true
  - key: member_profile
    type: member_profile
    title: TD Profile
    enabled: true
    content:
      show_photo: true
      show_top_issue: true
      show_vote_participation: true
      show_speech_rank: true
  - key: top_issues
    type: top_issues
    title: Top Issues
    enabled: true
    content:
      scope: constituency
      issue_limit: 8
  - key: member_top_issues
    type: top_issues
    title: Top Issues
    enabled: true
    content:
      scope: member
      issue_limit: 8
  - key: glossary
    type: glossary
    title: Glossary
    enabled: true

branding:
  account_name: Eirepolitic
  footer_note: Test pipeline output
  palette:
    bg: "#355E2B"
    panel: "#355E2B"
    text: "#F3EFE6"
    muted: "#E5DED1"
    accent: "#F3EFE6"
    accent_2: "#9EC5A2"
    border: "#F3EFE6"
