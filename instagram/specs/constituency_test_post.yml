post:
  slug: constituency-test
  title: Constituency Test Carousel
  output_root: generated_posts
  slide_size:
    width: 1080
    height: 1350

style:
  theme: classic_eirepolitic
  renderer: pillow
  chart_renderer: matplotlib

data:
  constituency: Wicklow-Wexford
  member_name:
  issue_limit: 8
  member_selection: highest_speech_count
  metrics:
    vote_participation_pct:
    speech_rank:
    constituency_speech_rank:
  glossary:
    issues: Political issue categories come from the debate issue classifier assigning one category or NONE to each speech segment.
    vote_participation_pct: Placeholder until a dedicated vote participation table is connected.
    speech_rank: Placeholder until a dedicated ranking table is connected.

slides:
  - key: overview
    type: constituency_overview
    title: Constituency overview
    enabled: true
  - key: member_profile
    type: member_profile
    title: TD profile
    enabled: true
  - key: top_issues
    type: top_issues
    title: Top issues in debate speeches
    enabled: true
    content:
      scope: constituency
  - key: member_top_issues
    type: top_issues
    title: Selected TD issue profile
    enabled: true
    content:
      scope: member
  - key: glossary
    type: glossary
    title: Methodology and glossary
    enabled: true

branding:
  account_name: Eirepolitic
  footer_note: Test pipeline output
  palette:
    bg: "#355E2B"
    panel: "#355E2B"
    panel_alt: "#446f39"
    text: "#F3EFE6"
    muted: "#E5DED1"
    accent: "#F3EFE6"
    accent_2: "#9EC5A2"
    border: "#F3EFE6"
    chart_bar: "#F3EFE6"
    chart_grid: "#9EC5A2"
    chart_label: "#F3EFE6"
    chart_tick: "#E5DED1"
