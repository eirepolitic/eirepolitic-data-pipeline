template_id: scatter_plot_draft_v1
status: draft
renderer: scatter_plot
description: Draft dark-green scatter plot for comparing two political metrics.
params:
  width: 1080
  height: 860
  max_points: 80
  min_radius: 7
  max_radius: 24
  show_labels: true
  show_legend: true
  value_format: integer
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  accent_2: "#9ec5a2"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
