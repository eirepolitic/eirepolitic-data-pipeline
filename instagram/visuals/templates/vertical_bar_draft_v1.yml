template_id: vertical_bar_draft_v1
status: draft
renderer: vertical_bar
description: Draft dark-green vertical bar chart for compact political category comparisons.
params:
  width: 1080
  height: 860
  max_items: 8
  sort: descending
  value_format: integer
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
