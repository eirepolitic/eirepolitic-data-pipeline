template_id: sourced_image_asset_draft_v1
status: draft
renderer: sourced_image_asset
description: Draft review-only sourced image asset wrapper with attribution metadata validation and deterministic local placeholder rendering.
params:
  width: 1080
  height: 860
  fit_mode: cover
  max_rows: 1
  allow_remote_downloads: false
  require_attribution_fields:
    - source_name
    - source_url
    - license
    - retrieved_at
  required_image_fields:
    - image_ref
    - source_name
    - source_url
    - license
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  accent_2: "#9ec5a2"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
  review_only: true
  no_publishing: true
