template_id: table_card_draft_v1
status: draft
renderer: table_card
description: Draft dark-green metric card grid for political facts and key figures.
params:
  width: 1080
  height: 860
  max_items: 8
  columns: 2
  value_format: auto
  show_sublabel: true
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  accent_2: "#9ec5a2"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
