template_id: horizontal_bar_draft_v1
status: draft
renderer: horizontal_bar
description: Draft dark-green horizontal bar chart for ranked political values.
params:
  width: 1080
  height: 860
  max_items: 7
  sort: descending
  value_format: integer
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
