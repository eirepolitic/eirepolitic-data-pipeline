template_id: ranking_table_draft_v1
status: draft
renderer: ranking_table
description: Draft dark-green ranking table for political candidates, parties, constituencies, or issues.
params:
  width: 1080
  height: 860
  max_items: 8
  sort: descending
  value_format: integer
  show_header: true
  rank_header: "#"
  name_header: "Name"
  value_header: "Value"
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  accent_2: "#9ec5a2"
  grid: "#cbbf9f"
  warning: "#b55b5b"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
