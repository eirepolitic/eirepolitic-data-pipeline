template_id: point_map_draft_v1
status: draft
renderer: point_map
description: Draft dark-green point map for political locations, events, offices, candidates, or incidents.
params:
  width: 1080
  height: 860
  max_points: 60
  min_radius: 8
  max_radius: 30
  show_labels: true
  show_legend: true
  value_format: integer
palette:
  background: "#0f2f24"
  panel: "#173d30"
  panel_alt: "#214a3b"
  text: "#f4ead7"
  muted: "#cbbf9f"
  accent: "#d8b45f"
  accent_2: "#9ec5a2"
  grid: "#cbbf9f"
  warning: "#b55b5b"
  map_fill: "#24483b"
  map_outline: "#f4ead7"
constraints:
  no_celtic_borders: true
  no_full_frame_ornamentation: true
  no_side_rails: true
  no_built_in_corner_decorations: true
