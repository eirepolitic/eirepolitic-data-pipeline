template: instagram/visuals/templates/choropleth_map_draft_v1.yml
geography:
  path: instagram/visuals/tests/choropleth_map_draft_v1/geography/sample_constituencies.json
bindings:
  feature_id: feature_id
  value: value
source_note: "Fixture data and synthetic geography for visual variation review only"
attribution:
  source_name: Synthetic fixture geography
  source_url: ""
  retrieved_at: ""
  license: "Internal test fixture"
  notes: "Deterministic synthetic polygons. Not for publication."
cases:
  - id: complete_join
    description: Complete one-to-one geography join
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: complete_join
  - id: sparse_join
    description: Partial data coverage with no-data regions
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: sparse_join
  - id: unmatched_ids
    description: Data rows that do not match geography features
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: unmatched_ids
  - id: tight_range
    description: Values close together
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: tight_range
  - id: wide_range
    description: Values spanning several orders of magnitude
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: wide_range
  - id: zero_values
    description: Includes zero values
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: zero_values
  - id: negative_values
    description: Includes negative values
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: missing_values
    description: Includes missing and invalid values
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: single_value
    description: All regions have the same value
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: single_value
  - id: phone_readability_stress
    description: Wide values with labels and legend
    data: instagram/visuals/tests/choropleth_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
