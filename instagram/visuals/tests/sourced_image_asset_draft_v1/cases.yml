template: instagram/visuals/templates/sourced_image_asset_draft_v1.yml
bindings:
  image_ref: image_ref
  asset_kind: asset_kind
  source_name: source_name
  source_url: source_url
  license: license
  retrieved_at: retrieved_at
  alt_text: alt_text
source_note: "Fixture metadata for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder sourced-image metadata. Not for publication."
cases:
  - id: complete_attribution
    description: Complete source attribution metadata
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: complete_attribution
  - id: missing_source_name
    description: Missing source name should warn
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_source_name
  - id: missing_source_url
    description: Missing source URL should warn
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_source_url
  - id: missing_license
    description: Missing license should warn
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_license
  - id: missing_retrieved_at
    description: Missing retrieval date should be displayed and warn through required attribution config
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_retrieved_at
  - id: invalid_url
    description: Invalid source URL should warn
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: invalid_url
  - id: unknown_license
    description: Unknown license should warn
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: unknown_license
  - id: long_metadata
    description: Long source fields should truncate cleanly
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_metadata
  - id: remote_disabled
    description: Remote-style image represented as deterministic placeholder
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: remote_disabled
  - id: multiple_rows
    description: Multiple rows should render first row only in placeholder wrapper
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: multiple_rows
  - id: phone_readability_stress
    description: Long metadata, invalid URL, unknown license, and missing retrieved date
    data: instagram/visuals/tests/sourced_image_asset_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
