template: instagram/visuals/templates/dot_plot_draft_v1.yml
bindings:
  label: label
  value: value
  category: category
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: 03_items
    description: Three-item minimal dot plot
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 03_items
  - id: 06_items
    description: Six-item standard dot plot
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 06_items
  - id: 12_items
    description: Twelve items at template maximum
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 12_items
  - id: overflow_items
    description: Fourteen items; should truncate to template max
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: overflow_items
  - id: long_labels
    description: Long labels should truncate cleanly
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_labels
  - id: category_mix
    description: Mixed categories and legend
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: category_mix
  - id: tight_range
    description: Values close together
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: tight_range
  - id: wide_range
    description: Values spanning several orders of magnitude
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: wide_range
  - id: zero_values
    description: Includes zero values
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: zero_values
  - id: negative_values
    description: Includes negative values and should warn
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: missing_values
    description: Missing and invalid values should warn
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: phone_readability_stress
    description: Mixed categories, long labels, wide values, zero and negative values
    data: instagram/visuals/tests/dot_plot_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
