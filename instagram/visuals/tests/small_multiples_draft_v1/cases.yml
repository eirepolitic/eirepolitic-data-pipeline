template: instagram/visuals/templates/small_multiples_draft_v1.yml
bindings:
  group: group
  x: period
  value: value
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: 02_groups
    description: Two mini trend panels
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 02_groups
  - id: 04_groups
    description: Four mini trend panels
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 04_groups
  - id: 06_groups
    description: Six mini trend panels at template maximum
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 06_groups
  - id: 08_groups_overflow
    description: Eight groups; should truncate to template maximum
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 08_groups_overflow
  - id: dense_timeline
    description: Fourteen points per group; should truncate to point maximum
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: dense_timeline
  - id: long_group_labels
    description: Long group labels
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_group_labels
  - id: missing_values
    description: Missing and invalid observations
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: negative_values
    description: Includes negative values and should warn
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: tight_range
    description: Values close together
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: tight_range
  - id: wide_range
    description: Values spanning several orders of magnitude
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: wide_range
  - id: phone_readability_stress
    description: Six long group labels with wide values
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
