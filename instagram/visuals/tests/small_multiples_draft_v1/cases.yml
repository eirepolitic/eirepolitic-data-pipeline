template: instagram/visuals/templates/small_multiples_draft_v1.yml
bindings:
  group: group
  x: period
  value: value
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: 02_groups
    description: Two small-multiple panels
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 02_groups
  - id: 04_groups
    description: Four panel grid
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 04_groups
  - id: 06_groups
    description: Six panel target maximum grid
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 06_groups
  - id: overflow_groups
    description: Seven groups; should truncate to template maximum
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: overflow_groups
  - id: dense_timeline
    description: Fourteen points per group; should truncate to template maximum
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: dense_timeline
  - id: long_group_names
    description: Long group titles
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_group_names
  - id: missing_values
    description: Missing and invalid values should warn and skip points
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: flat_trends
    description: Flat series for identical y-values
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: flat_trends
  - id: volatile_trends
    description: Sharp up and down movement
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: volatile_trends
  - id: negative_values
    description: Negative values should warn
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: phone_readability_stress
    description: Long group names and dense timelines
    data: instagram/visuals/tests/small_multiples_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
