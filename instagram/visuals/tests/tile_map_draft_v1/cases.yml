template: instagram/visuals/templates/tile_map_draft_v1.yml
geography:
  path: instagram/visuals/tests/tile_map_draft_v1/geography/sample_tile_layout.json
bindings:
  feature_id: feature_id
  value: value
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: complete_join
    description: All tile IDs join to values
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: complete_join
  - id: sparse_join
    description: Some layout tiles have no data
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: sparse_join
  - id: unmatched_ids
    description: Data contains feature IDs absent from layout
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: unmatched_ids
  - id: tight_range
    description: Values close together
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: tight_range
  - id: wide_range
    description: Values spanning several orders of magnitude
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: wide_range
  - id: zero_values
    description: Includes zero values
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: zero_values
  - id: negative_values
    description: Includes negative values
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: missing_values
    description: Missing and invalid values should warn
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: single_value
    description: Single joined tile value
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: single_value
  - id: phone_readability_stress
    description: Wide values, missing, negative, and unmatched IDs
    data: instagram/visuals/tests/tile_map_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
