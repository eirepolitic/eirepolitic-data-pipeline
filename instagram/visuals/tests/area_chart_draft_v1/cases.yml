template: instagram/visuals/templates/area_chart_draft_v1.yml
bindings:
  x: period
  series: series
  value: value
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: single_series
    description: One filled trend series
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: single_series
  - id: two_series
    description: Two filled trend series
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: two_series
  - id: four_series
    description: Four series at template maximum
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: four_series
  - id: six_series_overflow
    description: Six series; should truncate to template maximum
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: six_series_overflow
  - id: dense_timeline
    description: Twenty points; should truncate to point maximum
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: dense_timeline
  - id: long_series_labels
    description: Long series labels
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_series_labels
  - id: missing_values
    description: Missing and invalid observations
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: missing_values
  - id: negative_values
    description: Includes negative values and should warn
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: negative_values
  - id: tight_range
    description: Values close together
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: tight_range
  - id: wide_range
    description: Values spanning several orders of magnitude
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: wide_range
  - id: zero_values
    description: Includes zero values
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: zero_values
  - id: phone_readability_stress
    description: Long labels, two opposite trends, and wide values
    data: instagram/visuals/tests/area_chart_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
