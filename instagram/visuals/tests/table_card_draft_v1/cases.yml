template: instagram/visuals/templates/table_card_draft_v1.yml
bindings:
  label: label
  value: value
  sublabel: sublabel
source_note: "Fixture data for visual variation review only"
attribution:
  source_name: Fixture data
  source_url: ""
  retrieved_at: ""
  license: ""
  notes: "Placeholder political data. Not for publication."
cases:
  - id: 02_cards
    description: Two-card minimal grid
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 02_cards
  - id: 04_cards
    description: Four-card balanced grid
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 04_cards
  - id: 08_cards
    description: Eight-card target maximum grid
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: 08_cards
  - id: overflow_cards
    description: Ten cards; should truncate to template maximum
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: overflow_cards
  - id: long_labels
    description: Long metric labels
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_labels
  - id: long_sublabels
    description: Long supporting descriptions
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: long_sublabels
  - id: small_values
    description: Small integer values
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: small_values
  - id: large_values
    description: Large values using compact automatic formatting
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: large_values
  - id: mixed_text_values
    description: Text values instead of numeric metrics
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: mixed_text_values
  - id: zero_negative_values
    description: Zero and negative metrics
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: zero_negative_values
  - id: phone_readability_stress
    description: Maximum cards with long labels, long sublabels, text, and wide values
    data: instagram/visuals/tests/table_card_draft_v1/data/cases.csv
    filters:
      - field: case_id
        operator: equals
        value: phone_readability_stress
