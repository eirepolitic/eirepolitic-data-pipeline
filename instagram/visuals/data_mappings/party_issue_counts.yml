mapping_id: party_issue_counts
review_only: true
input:
  mode: joined_sources
  sources:
    members:
      mode: s3_csv_first_available
      keys:
        - processed/oireachtas_unified/compat/members/oireachtas_members_34th_dail_compat.csv
        - raw/members/oireachtas_members_34th_dail.csv
    debate_issues:
      mode: s3_csv_first_available
      keys:
        - processed/oireachtas_unified/compat/debates/debate_speeches_classified_compat.csv
        - processed/debates/debate_speeches_classified.csv
transforms:
  - id: party_issue_counts
    operation: join_members_to_speeches_then_count_by_issue
    member_name_candidates: [full_name, member_name, name, showAs]
    party_candidates: [party, party_name, latest_party_name]
    speaker_name_candidates: [Speaker Name, speaker_name, speaker, showAs]
    issue_candidates: [PoliticalIssues, issue_category, political_issues, issue, topic, category, label]
    output_label_field: label
    output_value_field: value
    max_rows: 7
    output_path: generated_factory_data/party_issue_counts.csv
manifest_path: generated_factory_data/party_issue_counts.manifest.json
