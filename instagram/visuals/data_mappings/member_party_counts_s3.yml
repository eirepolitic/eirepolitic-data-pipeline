mapping_id: member_party_counts_s3
review_only: true
input:
  mode: s3_csv_first_available
  bucket: eirepolitic-data
  region: ca-central-1
  required: true
  keys:
    - raw/members/oireachtas_members_34th_dail.csv
transforms:
  - id: party_counts
    operation: count_by
    label_field_candidates:
      - party
      - party_name
      - partyCode
      - party_code
      - group
      - label
    output_label_field: label
    output_value_field: value
    fallback_label: Independent / Unknown
    max_rows: 10
    output_path: generated_visual_data/member_party_counts_s3.csv
manifest_path: generated_visual_data/member_party_counts_s3.manifest.json
