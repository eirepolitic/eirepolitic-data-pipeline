catalogue_version: 1
visual_types:
- visual_type_id: horizontal_bar_draft_v1
  display_name: Horizontal bar chart
  renderer: horizontal_bar
  template_path: instagram/visuals/templates/horizontal_bar_draft_v1.yml
  status: draft
  intended_use: Ranked categories with readable labels.
  required_bindings:
  - label
  - value
  optional_bindings:
  - group
  supported_data_shapes:
  - category_value
  recommended_item_count:
    min: 2
    max: 7
  supported_slot_fit: contain
  known_limitations:
  - Long labels require wrapping
  - Overflow rows are truncated
  test_contact_sheet: instagram/visuals/tests/horizontal_bar_draft_v1/contact_sheet.png
  version: 1
  validation_profile:
    profile_id: horizontal_bar_real_data_v1
    data_policy: real_data_first
    required_scenarios:
    - item_count_min
    - item_count_max
    - labels_short
    - labels_long
    - values_small
    - values_large
    - values_tight
    - values_wide
    - single_outlier
    - all_equal
    - ties
    - zeros
    - real_example
    thresholds:
      single_outlier_top_to_second_ratio: 3.0
    fallback_order:
    - current_real
    - historical_real
    - synthetic_contract_edge
    - waived
    synthetic_allowed_only_for:
    - recurring_project_future_contract_edge
    - renderer_regression_fixture
